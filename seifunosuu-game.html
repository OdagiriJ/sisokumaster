<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正負の数 計算ゲーム</title>
  <style>
    :root {
      --bg: #0f0e17;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --subtle: #64748b;
      --accent: #a78bfa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.8em;
      font-weight: 800;
    }

    h1 span { color: var(--accent); }

    .tagline {
      color: var(--subtle);
      font-size: 0.88em;
      margin-top: 4px;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 720px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .expr-input {
      padding: 10px 16px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1.3em;
      font-family: monospace;
      width: 210px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .expr-input:focus { border-color: var(--accent); }

    .btn {
      padding: 10px 22px;
      border-radius: 12px;
      border: none;
      font-size: 1em;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, filter 0.12s;
    }

    .btn:hover { transform: translateY(-2px); filter: brightness(1.15); }

    .btn-primary { background: #7c3aed; color: white; }

    .btn-generate {
      background: linear-gradient(135deg, #b45309, #d97706);
      color: #fef3c7;
      font-size: 1em;
      border: none;
      letter-spacing: 0.02em;
    }

    .btn-generate:hover { filter: brightness(1.15); transform: translateY(-2px); }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .btn-preset {
      background: var(--surface);
      color: #94a3b8;
      border: 1px solid var(--border);
      font-size: 0.85em;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-preset:hover {
      background: #334155;
      color: white;
      border-color: var(--accent);
    }

    /* Game wrapper */
    .game-wrapper {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hint {
      text-align: center;
      color: var(--subtle);
      font-size: 0.85em;
    }

    /* Expression display */
    .expr-display {
      text-align: center;
      font-family: monospace;
      font-size: 1.05em;
      color: #94a3b8;
      padding: 6px;
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .expr-display span { color: var(--text); font-weight: bold; font-size: 1.1em; }

    /* Game area */
    .game-area {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 20px;
      min-height: 180px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 36px 24px;
      justify-content: center;
      align-items: center;
    }

    /* Tiles */
    .tile {
      width: 96px;
      height: 96px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9em;
      font-weight: 800;
      cursor: grab;
      user-select: none;
      touch-action: none;
      border: 2.5px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
    }

    .tile:hover { transform: translateY(-5px) scale(1.06); }

    .tile.positive {
      background: linear-gradient(135deg, #065f46, #059669);
      border-color: #34d399;
      box-shadow: 0 4px 22px rgba(5, 150, 105, 0.35);
      color: #d1fae5;
    }

    .tile.negative {
      background: linear-gradient(135deg, #7f1d1d, #dc2626);
      border-color: #f87171;
      box-shadow: 0 4px 22px rgba(220, 38, 38, 0.35);
      color: #fee2e2;
    }

    .tile.zero {
      background: linear-gradient(135deg, #1e3a5f, #1d4ed8);
      border-color: #60a5fa;
      box-shadow: 0 4px 22px rgba(29, 78, 216, 0.35);
      color: #dbeafe;
    }

    .tile.dragging {
      opacity: 0.25;
      transform: scale(0.9) !important;
      cursor: grabbing;
    }

    .tile.drop-target {
      transform: scale(1.13) translateY(-6px) !important;
      border-color: #fff !important;
      box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.5), 0 12px 36px rgba(167, 139, 250, 0.4) !important;
    }

    @keyframes pop-in {
      0%   { transform: scale(0.2) rotate(-12deg); opacity: 0; }
      60%  { transform: scale(1.18) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .tile.new { animation: pop-in 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* Ghost element (follows cursor while dragging) */
    .ghost {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      width: 96px;
      height: 96px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9em;
      font-weight: 800;
      border: 2.5px solid;
      opacity: 0.92;
      transform: rotate(6deg) scale(1.08);
      box-shadow: 0 16px 48px rgba(0,0,0,0.55);
    }

    /* Remaining counter */
    .remaining {
      text-align: center;
      color: var(--subtle);
      font-size: 0.88em;
    }

    .remaining b { color: var(--accent); }

    /* Number line */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
    }

    .panel-title {
      font-size: 0.8em;
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    /* Step chain (途中式) */
    .step-chain {
      font-family: monospace;
      font-size: 1.05em;
      line-height: 1;
      max-height: 260px;
      overflow-y: auto;
    }

    .step-line {
      display: block;
      padding: 6px 0;
      animation: slide-in 0.25s ease;
    }

    @keyframes slide-in {
      from { transform: translateY(-6px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .step-line.original { color: #94a3b8; }

    .step-line.intermediate .eq-mark { color: var(--accent); }
    .step-line.intermediate .expr-text { color: var(--text); }

    /* Win overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      z-index: 50;
    }

    @keyframes win-pop {
      0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
      70%  { transform: translate(-50%, -50%) scale(1.06); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    .win-card {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 100;
      background: linear-gradient(135deg, #312e81, #4c1d95);
      border: 2px solid #7c3aed;
      border-radius: 24px;
      padding: 44px 56px;
      text-align: center;
      box-shadow: 0 30px 90px rgba(0,0,0,0.65);
      animation: win-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .win-card .win-emoji { font-size: 3em; margin-bottom: 8px; }
    .win-card .win-label { color: #c4b5fd; font-size: 1em; margin-bottom: 6px; }
    .win-card .win-answer {
      font-size: 3.2em;
      font-weight: 900;
      color: #fbbf24;
      font-family: monospace;
    }
    .win-card .win-steps {
      color: #a78bfa;
      font-size: 0.9em;
      margin-top: 8px;
    }

    .win-btns { display: flex; gap: 10px; justify-content: center; margin-top: 22px; }

    .win-btn {
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      font-size: 0.95em;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.15s;
    }

    .win-btn:hover { filter: brightness(1.2); }
    .win-btn-main { background: #7c3aed; color: white; }
    .win-btn-sub  { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }

    /* Undo button */
    .btn-undo {
      background: var(--surface);
      color: #94a3b8;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 8px 20px;
      font-size: 0.9em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-undo:hover:not(:disabled) {
      background: #334155;
      color: white;
      border-color: #94a3b8;
    }
    .btn-undo:disabled { cursor: default; }

    /* ---- Mul sub-tiles (look normal initially) ---- */
    .tile.mul-sub.mul-highlighted,
    .tile.mul-sub.mul-revealed {
      border-color: #fbbf24 !important;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.45), 0 4px 22px rgba(217,119,6,0.4) !important;
    }

    /* × connector — plain text between mul sub-tiles */
    .mul-connector-btn {
      background: none;
      border: none;
      color: #e2e8f0;
      font-size: 1.4em;
      font-weight: 700;
      cursor: pointer;
      align-self: center;
      flex-shrink: 0;
      padding: 4px 2px;
      transition: color 0.15s, transform 0.15s;
    }

    .mul-connector-btn:hover {
      color: #fbbf24;
      transform: scale(1.2);
    }

    /* Tooltip bubble */
    .tooltip-bubble {
      position: fixed;
      z-index: 9999;
      background: #1e293b;
      border: 1.5px solid #fbbf24;
      color: #fef3c7;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.88em;
      font-weight: 700;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      animation: tooltip-in 0.18s ease;
    }

    @keyframes tooltip-in {
      from { transform: translateY(6px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .tooltip-bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #fbbf24;
    }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      18%      { transform: translateX(-7px) rotate(-2deg); }
      36%      { transform: translateX(7px)  rotate(2deg); }
      54%      { transform: translateX(-5px) rotate(-1deg); }
      72%      { transform: translateX(5px)  rotate(1deg); }
    }

    .tile.shaking { animation: shake 0.45s ease; }

    /* Pow exponent badge */
    .pow-exp-btn {
      position: absolute;
      top: 5px;
      right: 7px;
      font-size: 0.52em;
      font-weight: 900;
      cursor: pointer;
      background: rgba(255,255,255,0.22);
      border-radius: 6px;
      padding: 1px 5px;
      line-height: 1.35;
      border: 1.5px solid rgba(255,255,255,0.45);
      transition: background 0.15s, transform 0.15s;
      user-select: none;
      pointer-events: auto;
    }

    .pow-exp-btn:hover {
      background: rgba(255,255,255,0.48);
      transform: scale(1.2);
    }

    .tile.pow-tile { cursor: default; }
    .tile.pow-tile:hover { transform: none; }

    /* Flip animation for ÷frac → ×frac conversion */
    @keyframes flip-squish {
      0%   { transform: scaleY(1); }
      100% { transform: scaleY(0); }
    }
    @keyframes flip-expand {
      0%   { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }

    /* Fraction slash animation */
    .slash-overlay {
      position: fixed;
      pointer-events: none;
      z-index: 500;
      overflow: hidden;
    }

    @keyframes slash-draw {
      0%   { transform: rotate(-38deg) scaleX(0); opacity: 1; }
      55%  { transform: rotate(-38deg) scaleX(1); opacity: 1; }
      100% { transform: rotate(-38deg) scaleX(1); opacity: 0; }
    }

    .slash-line {
      position: absolute;
      top: 50%;
      left: -15%;
      width: 130%;
      height: 5px;
      margin-top: -2.5px;
      background: linear-gradient(90deg, transparent, #fff 15%, #fff 85%, transparent);
      transform-origin: left center;
      border-radius: 3px;
      box-shadow: 0 0 12px 3px rgba(255,255,255,0.85);
      animation: slash-draw 0.42s cubic-bezier(0.15,0,0.3,1) forwards;
    }

    /* 和が０になったとき：一瞬出てフェード消滅 */
    @keyframes zero-vanish {
      0%   { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.12) rotate(25deg); opacity: 0; }
    }
    .tile.zero-vanish {
      animation: zero-vanish 0.55s cubic-bezier(0.4, 0, 1, 1) forwards;
      pointer-events: none;
    }

    @keyframes reduced-pop {
      0%   { transform: scale(0.5); opacity: 0; }
      60%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .reduced-pop { animation: reduced-pop 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    /* 符号タイル（単独の＋か－）— 点線の円なし、白文字 */
    .sign-tile-btn {
      background: none;
      border: none;
      color: #e2e8f0;
      font-size: 1.65em;
      font-weight: 900;
      width: 44px;
      height: 44px;
      cursor: pointer;
      align-self: center;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, transform 0.15s;
      position: relative;
      z-index: 1;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    .sign-tile-btn:hover {
      color: #fbbf24;
      transform: scale(1.22);
    }

    /* Fraction display inside tile */
    .frac-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.75em;
      line-height: 1.15;
      font-weight: 900;
    }
    .frac-display .frac-num {
      border-bottom: 2.5px solid currentColor;
      padding: 0 5px;
      text-align: center;
    }
    .frac-display .frac-den {
      padding: 0 5px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>正負の数 <span>計算ゲーム</span></h1>
  <p class="tagline">項をドラッグ＆ドロップして合体させよう！</p>
</header>

<div class="controls">
  <div class="input-row">
    <input type="text" class="expr-input" id="expr-input" value="-1+3-5+7"
           placeholder="-1+3-5+7" onkeydown="if(event.key==='Enter') startGame()">
    <button class="btn btn-primary" onclick="startGame()">スタート</button>
  </div>
  <div class="presets">
    <button class="btn-preset" onclick="loadPreset('-1+3-5+7')">-1+3-5+7</button>
    <button class="btn-preset" onclick="loadPreset('2-4+6-3')">2-4+6-3</button>
    <button class="btn-preset" onclick="loadPreset('-3-2+8-1')">-3-2+8-1</button>
    <button class="btn-preset" onclick="loadPreset('5-9+4-2+6')">5-9+4-2+6</button>
    <button class="btn-preset" onclick="loadPreset('-7+3+2-5+8')">-7+3+2-5+8</button>
    <button class="btn-preset" style="border-color:#d97706;color:#fbbf24" onclick="loadPreset('-5+3×(-2)')">-5+3×(-2) ✨</button>
    <button class="btn-preset" style="border-color:#0891b2;color:#67e8f9" onclick="loadPreset('-5+6÷(-3)')">-5+6÷(-3) ✨</button>
    <button class="btn-preset" style="border-color:#8b5cf6;color:#c4b5fd" onclick="loadPreset('3^2-5')">3²-5 ⚡</button>
    <button class="btn-preset" style="border-color:#8b5cf6;color:#c4b5fd" onclick="loadPreset('(-2)^3+6')">(-2)³+6 ⚡</button>
    <button class="btn-preset" style="border-color:#0ea5e9;color:#7dd3fc" onclick="loadPreset('-4×(1/2)+3')">-4×½+3</button>
    <button class="btn-preset" style="border-color:#0ea5e9;color:#7dd3fc" onclick="loadPreset('6×(2/3)-5')">6×⅔-5</button>
    <button class="btn-preset" style="border-color:#f472b6;color:#fbcfe8" onclick="loadPreset('6÷(3/2)-2')">6÷³⁄₂-2 🔄</button>
    <button class="btn-preset" style="border-color:#f472b6;color:#fbcfe8" onclick="loadPreset('-9÷(3/4)+1')">-9÷¾+1 🔄</button>
    <button class="btn-preset" style="border-color:#34d399;color:#6ee7b7" onclick="loadPreset('-(-4)+3')">-(-4)+3 ±</button>
    <button class="btn-preset" style="border-color:#34d399;color:#6ee7b7" onclick="loadPreset('5-(-4)-2')">5-(-4)-2 ±</button>
    <button class="btn-preset" style="border-color:#34d399;color:#6ee7b7" onclick="loadPreset('-(-3)-(-2)+1')">-(-3)-(-2)+1 ±</button>
    <button class="btn-preset" style="border-color:#34d399;color:#6ee7b7" onclick="loadPreset('+(+5)+3')">+(+5)+3 ±</button>
    <button class="btn-preset" style="border-color:#34d399;color:#6ee7b7" onclick="loadPreset('5+(-3)+2')">5+(-3)+2 ±</button>
  </div>
  <button class="btn btn-generate" onclick="generateAndStart()">🎲 問題を生成する</button>
</div>

<div class="game-wrapper">
  <p class="hint">タイルをドラッグして、別のタイルの上でドロップ → 2項が足し合わされます</p>
  <div class="expr-display" id="expr-display"></div>
  <div class="game-area" id="game-area"></div>
  <p class="remaining" id="remaining"></p>
  <div style="text-align:center">
    <button class="btn-undo" id="undo-btn" onclick="undoStep()" disabled>↩ １つ前に戻る</button>
  </div>

  <div class="panel">
    <div class="panel-title">途中式</div>
    <div id="steps-list" class="step-chain"></div>
  </div>
</div>

<script>
/* ---- State ---- */
let tiles = [];
let idCtr = 0;
let dragId = null;
let ghostEl = null;
let stepCount = 0;
let history = [];  // undo stack

function pushHistory() {
  history.push({
    tiles:      JSON.parse(JSON.stringify(tiles)),
    stepCount:  stepCount,
    stepsHTML:  document.getElementById('steps-list').innerHTML
  });
  updateUndoBtn();
}

function undoStep() {
  if (history.length === 0) return;
  const snap = history.pop();
  tiles     = snap.tiles;
  stepCount = snap.stepCount;
  document.getElementById('steps-list').innerHTML = snap.stepsHTML;
  render();
  updateUndoBtn();
}

function updateUndoBtn() {
  const btn = document.getElementById('undo-btn');
  if (!btn) return;
  btn.disabled     = history.length === 0;
  btn.style.opacity = history.length === 0 ? '0.35' : '1';
}

/* ---- Parse ----
 * Returns array of:
 *   { type: 'simple', value: number }
 *   { type: 'mul',    left: number, right: number }
 */
function parseExpr(expr) {
  expr = expr.replace(/\s/g, '');
  const terms = [];
  // Priority order:
  //   1. (base)^exp  — negative base in parens e.g. (-2)^3
  //   2. base^exp    — positive/negative base e.g. 3^2 or -3^2
  //   3. num × (num) / num ÷ (num)
  //   4. num × num   / num ÷ num
  //   5. num
  // Groups:
  //  1,2   → (base)^exp
  //  3,4   → base^exp
  //  5,6,7 → num×(a/b)  fraction mul
  //  8,9,10 → num×(int) or num÷(int)
  //  11,12,13 → num×int or num÷int
  //  14    → simple num
  // Groups:
  //  m[1],m[2]            → (base)^exp
  //  m[3],m[4]            → base^exp
  //  m[5],m[6],m[7],m[8]  → left(×|÷)(num/den)  ← fraction mul/div
  //  m[9],m[10],m[11]     → left(×|÷)(int)
  //  m[12],m[13],m[14]    → left(×|÷)int
  //  m[15],m[16]          → sign(value)  ← 符号タイル e.g. -(−4) or +(+3)
  //  m[17]                → simple
  const re = /\(([+-]?\d+)\)\^([23])|([+-]?\d+)\^([23])|([+-]?\d+)(×|÷)\((\d+)\/(\d+)\)|([+-]?\d+)(×|÷)\(([+-]?\d+)\)|([+-]?\d+)(×|÷)([+-]?\d+)|([+-])\(([+-]?\d+)\)|([+-]?\d+)/g;
  let m;
  while ((m = re.exec(expr)) !== null) {
    if (m[1] !== undefined) {
      terms.push({ type: 'pow', base: parseInt(m[1]), exp: parseInt(m[2]) });
    } else if (m[3] !== undefined) {
      terms.push({ type: 'pow', base: parseInt(m[3]), exp: parseInt(m[4]) });
    } else if (m[5] !== undefined) {
      // fraction mul/div: left (×|÷) (num/den)
      terms.push({ type: 'mul', op: m[6], left: parseInt(m[5]), rightFrac: { num: parseInt(m[7]), den: parseInt(m[8]) } });
    } else if (m[9] !== undefined) {
      terms.push({ type: 'mul', op: m[10], left: parseInt(m[9]), right: parseInt(m[11]) });
    } else if (m[12] !== undefined) {
      terms.push({ type: 'mul', op: m[13], left: parseInt(m[12]), right: parseInt(m[14]) });
    } else if (m[15] !== undefined) {
      // 符号タイル: -(−4) / +(+3) など — sign tile + value tile の2つを生成
      terms.push({ type: 'sign', op: m[15] });
      terms.push({ type: 'simple', value: parseInt(m[16]) });
    } else {
      terms.push({ type: 'simple', value: parseInt(m[17]) });
    }
  }
  return terms;
}

/* ---- Formatting / color ---- */
function fmt(n) { return n >= 0 ? '+' + n : String(n); }

function colorClass(n) { return n > 0 ? 'positive' : n < 0 ? 'negative' : 'zero'; }

function tileStyle(n) {
  if (n > 0) return { bg: 'linear-gradient(135deg,#065f46,#059669)', border: '#34d399', shadow: 'rgba(5,150,105,0.45)', text: '#d1fae5' };
  if (n < 0) return { bg: 'linear-gradient(135deg,#7f1d1d,#dc2626)', border: '#f87171', shadow: 'rgba(220,38,38,0.45)', text: '#fee2e2' };
  return       { bg: 'linear-gradient(135deg,#1e3a5f,#1d4ed8)', border: '#60a5fa', shadow: 'rgba(29,78,216,0.45)', text: '#dbeafe' };
}

/* ---- Game control ---- */
function loadPreset(expr) {
  document.getElementById('expr-input').value = expr;
  startGame();
}

function startGame() {
  const expr = document.getElementById('expr-input').value;
  const terms = parseExpr(expr);
  if (terms.length < 2) { alert('2項以上の式を入力してください'); return; }

  tiles = terms.map(t => {
    if (t.type === 'sign') return { id: idCtr++, type: 'sign', op: t.op };
    if (t.type === 'mul') {
      const tile = { id: idCtr++, type: 'mul', op: t.op || '×', left: t.left, revealed: false };
      if (t.rightFrac) tile.rightFrac = t.rightFrac;
      else tile.right = t.right;
      return tile;
    }
    if (t.type === 'pow') return { id: idCtr++, type: 'pow', base: t.base, exp: t.exp };
    return { id: idCtr++, type: 'simple', value: t.value };
  });
  stepCount = 0;
  history   = [];
  updateUndoBtn();

  const exprStr = formatExprDisplay(terms);
  document.getElementById('steps-list').innerHTML = '';
  document.getElementById('expr-display').innerHTML =
    '計算する式：<span>' + exprStr + '</span>';

  // Show original as first line of step chain
  const orig = document.createElement('span');
  orig.className = 'step-line original';
  orig.textContent = exprStr;
  document.getElementById('steps-list').appendChild(orig);

  render();
}

function formatExprDisplay(terms) {
  const parts = [];
  let i = 0;
  while (i < terms.length) {
    const t = terms[i];
    if (t.type === 'sign') {
      // 符号と次の値を 1 つにまとめて表示: -(−4) / +(+3)
      const next = terms[i + 1];
      if (next && next.type === 'simple') {
        const valStr = next.value >= 0 ? `+${next.value}` : String(next.value);
        parts.push(`${t.op}(${valStr})`);
        i += 2; continue;
      }
      parts.push(t.op);
    } else if (t.type === 'mul') {
      const l = parts.length === 0 ? String(t.left) : (t.left >= 0 ? '+' + t.left : String(t.left));
      if (t.rightFrac) parts.push(`${l}${t.op}(${t.rightFrac.num}/${t.rightFrac.den})`);
      else parts.push(`${l}${t.op || '×'}(${t.right})`);
    } else if (t.type === 'pow') {
      const baseStr = t.base < 0 ? `(${t.base})` : String(t.base);
      // 式の途中に ( ) が来る場合は必ず前に演算子を付ける
      parts.push(parts.length === 0 ? `${baseStr}^${t.exp}` : `+${baseStr}^${t.exp}`);
    } else { // simple
      if (parts.length === 0) parts.push(String(t.value));
      else parts.push(t.value >= 0 ? `+${t.value}` : String(t.value));
    }
    i++;
  }
  return parts.join(' ');
}

/* ---- Render ---- */
function render(newId = null) {
  const area = document.getElementById('game-area');
  area.innerHTML = '';

  tiles.forEach((tile, idx) => {
    const prevTile = idx > 0 ? tiles[idx - 1] : null;
    if (tile.type === 'sign') {
      area.appendChild(createSignEl(tile, tile.id === newId));
    } else if (tile.type === 'mul') {
      createMulSubEls(tile, tile.id === newId).forEach(el => { if (el) area.appendChild(el); });
    } else if (tile.type === 'pow') {
      area.appendChild(createPowTileEl(tile, tile.id === newId));
    } else {
      // 符号タイルの直後は (＋5) のようにカッコ付きで表示
      const inParens = prevTile?.type === 'sign';
      area.appendChild(createSimpleTileEl(tile, tile.id === newId, inParens));
    }
  });

  const rem = document.getElementById('remaining');
  const mulCount  = tiles.filter(t => t.type === 'mul').length;
  const powCount  = tiles.filter(t => t.type === 'pow').length;
  const signCount = tiles.filter(t => t.type === 'sign').length;
  const simCount  = tiles.filter(t => t.type === 'simple').length;

  if (powCount > 0) {
    rem.innerHTML = `<b style="color:#c4b5fd">指数</b> をクリックして累乗を計算しよう！`;
  } else if (mulCount > 0 && tiles.some(t => t.type === 'mul' && t.revealed)) {
    rem.innerHTML = `<b style="color:#fbbf24">×</b> ボタンを押してかけ算を解決しよう！`;
  } else if (signCount > 0) {
    rem.innerHTML = `<b style="color:#f59e0b">（　）</b> の左にある <b style="color:#f59e0b">＋ / −</b> をクリックして符号を統合しよう！`;
  } else if (simCount > 1 || (simCount >= 1 && mulCount === 0)) {
    rem.innerHTML = simCount > 1
      ? `残り <b>${simCount}</b> 項 — あと <b>${simCount - 1}</b> 回たし合わせられます`
      : '';
  } else {
    rem.innerHTML = '';
  }
}

/* ---- Sign tile element ---- */
function createSignEl(tile, isNew) {
  const btn = document.createElement('button');
  btn.className = 'sign-tile-btn';
  btn.dataset.id = tile.id;
  btn.title = 'クリックで符号を統合';
  btn.textContent = tile.op === '+' ? '＋' : '－';

  if (isNew) {
    btn.style.animation = 'pop-in 0.42s cubic-bezier(0.34,1.56,0.64,1) forwards';
  }

  btn.addEventListener('click', () => resolveSign(tile.id));
  return btn;
}

/* ---- Sign resolve: 符号が右のカードにスライドして統合 ---- */
function resolveSign(signTileId) {
  const signIdx = tiles.findIndex(t => t.id === signTileId);
  if (signIdx === -1) return;

  const signTile = tiles[signIdx];
  const rightTile = tiles[signIdx + 1];
  if (!rightTile) return;

  const signEl  = document.querySelector(`.sign-tile-btn[data-id="${signTileId}"]`);
  const rightEl = document.querySelector(`.tile[data-id="${rightTile.id}"]`);

  // 右隣が累乗タイルなら先に累乗を処理させる
  if (rightTile.type === 'pow') {
    showTooltip(signEl || document.body, '⚡ 累乗を先に計算しよう（指数をクリック）');
    return;
  }
  // 右隣がかけ算タイルなら先にかけ算を処理させる
  if (rightTile.type === 'mul') {
    const tip = rightTile.op === '÷' ? '⚡ わり算を先に処理しよう' : '⚡ かけ算を先に処理しよう';
    showTooltip(signEl || document.body, tip);
    return;
  }
  // 右隣がさらに符号タイルの場合も先に処理
  if (rightTile.type === 'sign') {
    showTooltip(signEl || document.body, '⚡ 右の符号を先に処理しよう');
    return;
  }

  if (!signEl || !rightEl) return;
  pushHistory();

  // ---- アニメーション: 符号が右のカードへスライド ----
  const sr = signEl.getBoundingClientRect();
  const rr = rightEl.getBoundingClientRect();
  const dx = (rr.left + rr.width  / 2) - (sr.left + sr.width  / 2);
  const dy = (rr.top  + rr.height / 2) - (sr.top  + sr.height / 2);

  signEl.style.position   = 'relative';
  signEl.style.zIndex     = '300';
  signEl.style.transition = `transform 0.30s cubic-bezier(0.4,0,0.2,1), opacity 0.30s ease`;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    signEl.style.transform = `translate(${dx}px, ${dy}px) scale(1.6)`;
    signEl.style.opacity   = '0';
  }));

  // 右タイルが光ってはじく
  setTimeout(() => {
    if (!rightEl.isConnected) return;
    rightEl.style.transition = 'transform 0.10s ease-out, box-shadow 0.10s ease-out';
    rightEl.style.transform  = 'scale(1.22)';
    rightEl.style.boxShadow  = '0 0 0 5px rgba(251,191,36,0.75)';
    setTimeout(() => {
      rightEl.style.transform = '';
      rightEl.style.boxShadow = '';
    }, 160);
  }, 210);

  // ---- データ更新・再描画 ----
  setTimeout(() => {
    const newValue = signTile.op === '-' ? -rightTile.value : rightTile.value;

    tiles.splice(signIdx, 1); // 符号タイルを削除
    const ri = tiles.findIndex(t => t.id === rightTile.id);
    if (ri === -1) return;
    const newId = idCtr++;
    tiles[ri] = { id: newId, type: 'simple', value: newValue };

    stepCount++;
    addIntermediate();
    render(newId);

    if (tiles.length === 1 && tiles[0].type === 'simple') {
      setTimeout(() => showWin(tiles[0].value, stepCount), 550);
    }
  }, 360);
}

function createSimpleTileEl(tile, isNew, inParens = false) {
  const el = document.createElement('div');
  el.className = 'tile ' + colorClass(tile.value) + (isNew ? ' new' : '');
  el.dataset.id = tile.id;
  // 符号タイルの直後は (＋5) / (－4) と括弧付きで表示
  el.textContent = inParens
    ? (tile.value >= 0 ? `(+${tile.value})` : `(${tile.value})`)
    : fmt(tile.value);
  el.addEventListener('pointerdown', onPointerDown, { passive: false });
  return el;
}

/* Pow tile — colored tile with clickable exponent badge */
function createPowTileEl(tile, isNew) {
  const el = document.createElement('div');
  el.className = 'tile pow-tile ' + colorClass(tile.base) + (isNew ? ' new' : '');
  el.dataset.id = tile.id;

  // Base number display
  el.textContent = tile.base < 0 ? '(' + tile.base + ')' : '+' + tile.base;

  // Exponent badge
  const badge = document.createElement('span');
  badge.className = 'pow-exp-btn';
  badge.textContent = tile.exp === 2 ? '²' : '³';
  badge.title = `クリックして ${tile.base}^${tile.exp} を計算`;
  badge.addEventListener('click', (e) => {
    e.stopPropagation();
    resolvePow(tile.id);
  });
  el.appendChild(badge);

  el.addEventListener('click', (e) => {
    if (e.target === badge) return;
    showTooltip(el, '⚡ まずは累乗から処理しよう（指数をクリック）');
  });

  return el;
}

function resolvePow(tileId) {
  const idx = tiles.findIndex(t => t.id === tileId);
  if (idx === -1 || tiles[idx].type !== 'pow') return;
  const tile = tiles[idx];
  pushHistory();
  const result = Math.pow(tile.base, tile.exp);
  const newId = idCtr++;
  stepCount++;
  tiles[idx] = { id: newId, type: 'simple', value: result };
  addIntermediate();
  render(newId);
  if (tiles.length === 1 && tiles[0].type === 'simple') {
    setTimeout(() => showWin(tiles[0].value, stepCount), 550);
  }
}

/* Mul term → two separate-looking tiles + always-visible × connector */
function createMulSubEls(tile, isNew) {
  const animClass = isNew ? ' new' : '';
  const revClass  = tile.revealed ? ' mul-revealed' : '';

  const leftEl = document.createElement('div');
  leftEl.className = `tile ${colorClass(tile.left)} mul-sub${revClass}${animClass}`;
  leftEl.dataset.mulid   = tile.id;
  leftEl.dataset.mulpart = 'left';
  leftEl.textContent = fmt(tile.left);

  const rightEl = document.createElement('div');
  rightEl.dataset.mulid   = tile.id;
  rightEl.dataset.mulpart = 'right';
  if (tile.rightFrac) {
    rightEl.className = `tile positive mul-sub${revClass}`;
    const frac = document.createElement('div');
    frac.className = 'frac-display';
    frac.innerHTML = `<span class="frac-num">${tile.rightFrac.num}</span><span class="frac-den">${tile.rightFrac.den}</span>`;
    rightEl.appendChild(frac);
  } else {
    rightEl.className = `tile ${colorClass(tile.right)} mul-sub${revClass}`;
    rightEl.textContent = `(${fmt(tile.right)})`;
  }

  [leftEl, rightEl].forEach(el => {
    el.addEventListener('pointerenter', () => highlightMulPair(tile.id, true));
    el.addEventListener('pointerleave', () => highlightMulPair(tile.id, false));
    el.addEventListener('pointerdown', onMulPartPointerDown, { passive: false });
  });

  // operator connector — always visible from the start
  const connEl = document.createElement('button');
  connEl.className = 'mul-connector-btn';
  connEl.dataset.mulid = tile.id;
  connEl.textContent = tile.op || '×';
  connEl.addEventListener('click', () => {
    if (tiles.some(t => t.type === 'pow')) {
      showTooltip(connEl, '⚡ まず累乗を処理しよう！');
      return;
    }
    const t = tiles.find(x => x.id === tile.id);
    if (t?.rightFrac && t?.op === '÷') {
      animateDivFracToMul(tile.id);   // ÷(分数) → フリップ → ×(逆数) → 約分へ
    } else if (t?.rightFrac) {
      animateFractionResolve(tile.id);
    } else {
      resolveMul(tile.id);
    }
  });

  return [leftEl, connEl, rightEl];
}

function highlightMulPair(mulId, on) {
  document.querySelectorAll(`.tile.mul-sub[data-mulid="${mulId}"]`).forEach(el =>
    el.classList.toggle('mul-highlighted', on)
  );
}

/* ---- Mul sub-tile interaction ---- */
function onMulPartPointerDown(e) {
  e.preventDefault();

  const mulId = parseInt(e.currentTarget.dataset.mulid);
  const tile  = tiles.find(t => t.id === mulId);
  if (!tile) return;

  // Shake both parts together
  document.querySelectorAll(`.tile.mul-sub[data-mulid="${mulId}"]`).forEach(el => {
    el.classList.remove('shaking');
    void el.offsetWidth;
    el.classList.add('shaking');
    setTimeout(() => el.classList.remove('shaking'), 500);
  });

  const tip = tile.op === '÷' ? '⚡ まずはわり算処理しよう！（「÷」をクリック）' : '⚡ まずはかけ算処理しよう！（「×」をクリック）';
  showTooltip(e.currentTarget, tip);

  // First time → highlight pair permanently
  if (!tile.revealed) {
    tile.revealed = true;
    document.querySelectorAll(`.tile.mul-sub[data-mulid="${mulId}"]`)
      .forEach(el => el.classList.add('mul-revealed'));
  }
}

function showTooltip(anchorEl, message) {
  document.querySelectorAll('.tooltip-bubble').forEach(t => t.remove());

  const tip = document.createElement('div');
  tip.className = 'tooltip-bubble';
  tip.textContent = message;
  document.body.appendChild(tip);

  const rect = anchorEl.getBoundingClientRect();
  const tipW = tip.offsetWidth;
  const tipH = tip.offsetHeight;
  let left = rect.left + rect.width / 2 - tipW / 2;
  let top  = rect.top + window.scrollY - tipH - 14;
  left = Math.max(8, Math.min(left, window.innerWidth - tipW - 8));
  tip.style.left = left + 'px';
  tip.style.top  = top  + 'px';

  setTimeout(() => { if (tip.parentNode) tip.remove(); }, 2400);
}

/* ---- ÷(分数) → ×(逆数) フリップアニメーション ---- */
function animateDivFracToMul(tileId) {
  const tile = tiles.find(t => t.id === tileId);
  if (!tile || !tile.rightFrac || tile.op !== '÷') return;

  const connEl  = document.querySelector(`.mul-connector-btn[data-mulid="${tileId}"]`);
  const rightEl = document.querySelector(`.tile.mul-sub[data-mulid="${tileId}"][data-mulpart="right"]`);
  if (!connEl || !rightEl) return;

  pushHistory();

  const HALF = 220; // ms

  // --- スクイッシュ（つぶす）フェーズ ---
  [connEl, rightEl].forEach(el => {
    el.style.transition     = `transform ${HALF}ms ease-in`;
    el.style.transformOrigin = 'center center';
  });
  // 次フレームで変形を開始
  requestAnimationFrame(() => requestAnimationFrame(() => {
    connEl.style.transform  = 'scaleY(0)';
    rightEl.style.transform = 'scaleY(0)';
  }));

  // --- 中間点（scaleY=0）: 中身を書き換えて逆数へ ---
  setTimeout(() => {
    const newNum = tile.rightFrac.den; // 逆数: 分子←元の分母
    const newDen = tile.rightFrac.num; // 逆数: 分母←元の分子

    // ÷ → ×
    connEl.textContent = '×';

    // 分数カードを逆数に更新
    const fracDisplay = rightEl.querySelector('.frac-display');
    if (fracDisplay) {
      fracDisplay.querySelector('.frac-num').textContent = newNum;
      fracDisplay.querySelector('.frac-den').textContent = newDen;
    }

    // --- 展開フェーズ ---
    [connEl, rightEl].forEach(el => {
      el.style.transition = `transform ${HALF}ms ease-out`;
      el.style.transform  = 'scaleY(1)';
    });
  }, HALF + 10);

  // --- 完了: データモデルを更新 ---
  setTimeout(() => {
    const idx = tiles.findIndex(t => t.id === tileId);
    if (idx === -1) return;
    tiles[idx] = {
      id:        tile.id,
      type:      'mul',
      op:        '×',
      left:      tile.left,
      rightFrac: { num: tile.rightFrac.den, den: tile.rightFrac.num },
      revealed:  true
    };
    // トランジションを外してクリーンアップ（再レンダリングは不要: DOM は正しい状態）
    [connEl, rightEl].forEach(el => {
      el.style.transition     = '';
      el.style.transform      = '';
      el.style.transformOrigin = '';
    });
    // ステップログに ÷→× を記録
    stepCount++;
    addIntermediate();
  }, HALF * 2 + 30);
}

/* ---- Fraction slash animation ---- */
function animateFractionResolve(tileId) {
  const tile = tiles.find(t => t.id === tileId);
  if (!tile?.rightFrac) { resolveMul(tileId); return; }

  const leftEl  = document.querySelector(`.tile.mul-sub[data-mulid="${tileId}"][data-mulpart="left"]`);
  const rightEl = document.querySelector(`.tile.mul-sub[data-mulid="${tileId}"][data-mulpart="right"]`);
  if (!leftEl || !rightEl) { resolveMul(tileId); return; }
  pushHistory();

  function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }
  const g           = gcd(Math.abs(tile.left), tile.rightFrac.den);
  const leftReduced = tile.left / g;
  const numVal      = tile.rightFrac.num;

  // Slash overlay: covers `coverEl`, line geometrically passes through center of `targetEl`.
  // The slash-line rotates -38deg around its left end (transform-origin: left center).
  // For the line to cross point (tx, ty) in overlay coords:
  //   ty = lineTop - (tx - lineLeftX) * tan(38deg)
  //   → lineTop = ty + (tx - lineLeftX) * tan(38deg)
  function addSlash(coverEl, targetEl, pad = 8) {
    const cr = coverEl.getBoundingClientRect();
    const tr = targetEl.getBoundingClientRect();
    const oW = cr.width  + pad * 2;
    const oH = cr.height + pad * 2;

    const wrap = document.createElement('div');
    wrap.className = 'slash-overlay';
    wrap.style.cssText = `left:${cr.left - pad}px;top:${cr.top - pad}px;width:${oW}px;height:${oH}px;`;

    const line = document.createElement('div');
    line.className = 'slash-line';

    // Target center in overlay coords
    const tx = (tr.left + tr.width  / 2) - (cr.left - pad);
    const ty = (tr.top  + tr.height / 2) - (cr.top  - pad);

    // Left end of slash-line in overlay coords (CSS: left: -15%)
    const lineLeftX = -0.15 * oW;
    const tan38 = Math.tan(38 * Math.PI / 180); // ≈ 0.781

    // lineTop so the "/" line passes through (tx, ty)
    const lineTop = ty + (tx - lineLeftX) * tan38;

    line.style.top      = lineTop + 'px';
    line.style.marginTop = '0';
    wrap.appendChild(line);
    document.body.appendChild(wrap);
    return wrap;
  }

  const denEl = rightEl.querySelector('.frac-den');

  // Phase 1: left tile → line at card center / fraction card → line at denominator position
  const s1 = addSlash(leftEl, leftEl, 8);           // slash centered on integer card
  const s2 = addSlash(rightEl, denEl || rightEl, 8); // slash covers fraction card, hits denominator

  // dim the slashed numbers
  leftEl.style.transition = 'opacity 0.2s 0.12s';
  leftEl.style.opacity    = '0.2';
  if (denEl) { denEl.style.transition = 'opacity 0.2s 0.12s'; denEl.style.opacity = '0.1'; }

  // Phase 2 (380ms): slashes fade → show reduced values
  setTimeout(() => {
    s1.remove(); s2.remove();
    leftEl.style.opacity = ''; leftEl.style.transition = '';
    if (denEl) { denEl.style.opacity = ''; denEl.style.transition = ''; }

    // Update left tile display to reduced value
    leftEl.textContent = leftReduced >= 0 ? '+' + leftReduced : String(leftReduced);
    leftEl.classList.remove('reduced-pop'); void leftEl.offsetWidth; leftEl.classList.add('reduced-pop');

    // Update right tile: show numerator only (denominator = 1 now)
    rightEl.innerHTML = '';
    const numLabel = document.createElement('span');
    numLabel.textContent = numVal >= 0 ? '+' + numVal : String(numVal);
    rightEl.appendChild(numLabel);
    rightEl.classList.remove('reduced-pop'); void rightEl.offsetWidth; rightEl.classList.add('reduced-pop');
  }, 380);

  // Phase 3 (800ms): commit reduced state to data, re-render with × still visible
  setTimeout(() => {
    const idx = tiles.findIndex(t => t.id === tileId);
    if (idx === -1) return;
    // Convert fraction mul → regular mul (leftReduced × numVal), keep same id
    tiles[idx] = { id: tile.id, type: 'mul', op: '×', left: leftReduced, right: numVal, revealed: true };
    stepCount++;
    addIntermediate();
    render(); // × connector still shows → user clicks again to finish
  }, 800);
}

function resolveMul(tileId) {
  const idx = tiles.findIndex(t => t.id === tileId);
  if (idx === -1 || tiles[idx].type !== 'mul') return;
  const tile = tiles[idx];
  pushHistory();

  const result = tile.rightFrac
    ? tile.left * tile.rightFrac.num / tile.rightFrac.den
    : tile.op === '÷' ? tile.left / tile.right : tile.left * tile.right;
  const newId  = idCtr++;
  stepCount++;

  // Replace in-place so position in the row is preserved
  tiles[idx] = { id: newId, type: 'simple', value: result };

  addIntermediate();
  render(newId);

  if (tiles.length === 1 && tiles[0].type === 'simple') {
    setTimeout(() => showWin(tiles[0].value, stepCount), 550);
  }
}

/* ---- Drag via Pointer Events (simple tiles only) ---- */
function onPointerDown(e) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();

  const el = e.currentTarget;

  if (tiles.some(t => t.type === 'pow')) {
    showTooltip(el, '⚡ まず累乗を処理しよう！');
    return;
  }

  if (tiles.some(t => t.type === 'mul')) {
    const mulTile = tiles.find(t => t.type === 'mul');
    const tip = mulTile.op === '÷'
      ? '⚡ まずはわり算処理しよう！（「÷」をクリック）'
      : '⚡ まずはかけ算処理しよう！（「×」をクリック）';
    showTooltip(el, tip);
    return;
  }

  if (tiles.some(t => t.type === 'sign')) {
    showTooltip(el, '⚡ （　）の左にある ＋ / − をクリックして符号を統合しよう！');
    return;
  }

  dragId = parseInt(el.dataset.id);
  const tile = tiles.find(t => t.id === dragId);
  if (!tile || tile.type !== 'simple') return;

  el.setPointerCapture(e.pointerId);

  const s = tileStyle(tile.value);
  ghostEl = document.createElement('div');
  ghostEl.className = 'ghost';
  ghostEl.textContent = fmt(tile.value);
  ghostEl.style.background  = s.bg;
  ghostEl.style.borderColor = s.border;
  ghostEl.style.color       = s.text;
  ghostEl.style.boxShadow   = `0 16px 48px ${s.shadow}`;
  document.body.appendChild(ghostEl);

  el.classList.add('dragging');
  positionGhost(e.clientX, e.clientY);

  el.addEventListener('pointermove',  onPointerMove,  { passive: false });
  el.addEventListener('pointerup',    onPointerUp);
  el.addEventListener('pointercancel',onPointerCancel);
}

function positionGhost(x, y) {
  if (!ghostEl) return;
  ghostEl.style.left = (x - 48) + 'px';
  ghostEl.style.top  = (y - 48) + 'px';
}

function onPointerMove(e) {
  e.preventDefault();
  positionGhost(e.clientX, e.clientY);
  document.querySelectorAll('.tile.drop-target').forEach(el => el.classList.remove('drop-target'));
  const under = tileUnderPoint(e.clientX, e.clientY);
  if (under) under.classList.add('drop-target');
}

function onPointerUp(e) {
  e.preventDefault();
  const under = tileUnderPoint(e.clientX, e.clientY);
  endDrag(e.currentTarget);

  if (under) {
    const targetId = parseInt(under.dataset.id);
    if (targetId !== dragId) { combine(dragId, targetId); dragId = null; return; }
  }
  dragId = null;
}

function onPointerCancel(e) { endDrag(e.currentTarget); dragId = null; }

function endDrag(el) {
  el.classList.remove('dragging');
  el.removeEventListener('pointermove',   onPointerMove);
  el.removeEventListener('pointerup',     onPointerUp);
  el.removeEventListener('pointercancel', onPointerCancel);
  document.querySelectorAll('.tile.drop-target').forEach(t => t.classList.remove('drop-target'));
  purgeGhost();
}

/* Forcefully remove any floating ghost elements and dragging classes */
function purgeGhost() {
  document.querySelectorAll('.ghost').forEach(el => el.remove());
  ghostEl = null;
  document.querySelectorAll('.tile.dragging').forEach(el => el.classList.remove('dragging'));
}

/* Only simple tiles are valid drop targets */
function tileUnderPoint(x, y) {
  if (ghostEl) ghostEl.style.display = 'none';
  const el = document.elementFromPoint(x, y);
  if (ghostEl) ghostEl.style.display = '';
  if (!el) return null;
  const tileEl = el.closest('.tile:not(.mul-sub)');
  if (tileEl && parseInt(tileEl.dataset.id) !== dragId) return tileEl;
  return null;
}

/* ---- Combine (addition) ---- */
function combine(fromId, toId) {
  purgeGhost();
  pushHistory();
  const fromIdx = tiles.findIndex(t => t.id === fromId);
  const toIdx   = tiles.findIndex(t => t.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;

  const from = tiles[fromIdx];
  const to   = tiles[toIdx];
  const newVal = from.value + to.value;
  const newId  = idCtr++;
  stepCount++;

  const keepIdx   = Math.min(fromIdx, toIdx);
  const removeIdx = Math.max(fromIdx, toIdx);

  // ---- 和が０ ----
  if (newVal === 0) {
    tiles[keepIdx] = { id: newId, type: 'simple', value: 0 };
    tiles.splice(removeIdx, 1);
    render(newId); // pop-in で 0 タイル表示

    // ★ 最終答えが 0（これ以上タイルがない）→ 消滅させず win へ
    if (tiles.length === 1) {
      addIntermediate();
      setTimeout(() => showWin(0, stepCount), 600);
      return;
    }

    // 途中で 0 になった場合 → 一瞬表示してフェード消滅、途中式には残さない
    setTimeout(() => {
      const zeroEl = document.querySelector(`.tile[data-id="${newId}"]`);
      if (zeroEl) zeroEl.classList.add('zero-vanish');
    }, 420);

    setTimeout(() => {
      const idx = tiles.findIndex(t => t.id === newId);
      if (idx === -1) return; // undo済みの場合は何もしない
      tiles.splice(idx, 1);
      render();
      if (tiles.length === 1 && tiles[0].type === 'simple') {
        setTimeout(() => showWin(tiles[0].value, stepCount), 550);
      }
    }, 1000);
    return;
  }

  // ---- 通常の合体 ----
  tiles[keepIdx] = { id: newId, type: 'simple', value: newVal };
  tiles.splice(removeIdx, 1);

  addIntermediate();
  render(newId);

  if (tiles.length === 1 && tiles[0].type === 'simple') {
    setTimeout(() => showWin(tiles[0].value, stepCount), 550);
  }
}

/* ---- Current expression string from tiles ---- */
function currentExprStr() {
  const parts = [];
  let i = 0;
  while (i < tiles.length) {
    const t = tiles[i];
    if (t.type === 'sign') {
      const next = tiles[i + 1];
      if (next && next.type === 'simple') {
        const valStr = next.value >= 0 ? `+${next.value}` : String(next.value);
        parts.push(`${t.op}(${valStr})`);
        i += 2; continue;
      }
      parts.push(t.op);
    } else if (t.type === 'mul') {
      const l = parts.length === 0 ? String(t.left) : (t.left >= 0 ? '+' + t.left : String(t.left));
      if (t.rightFrac) parts.push(`${l}${t.op}(${t.rightFrac.num}/${t.rightFrac.den})`);
      else parts.push(`${l}${t.op}(${t.right})`);
    } else if (t.type === 'pow') {
      const baseStr = t.base < 0 ? `(${t.base})` : String(t.base);
      parts.push(parts.length === 0 ? `${baseStr}^${t.exp}` : `+${baseStr}^${t.exp}`);
    } else { // simple
      if (parts.length === 0) parts.push(String(t.value));
      else parts.push(t.value >= 0 ? `+${t.value}` : String(t.value));
    }
    i++;
  }
  return parts.join('');
}

/* ---- Step log (途中式) ---- */
function addIntermediate() {
  const list = document.getElementById('steps-list');
  const line = document.createElement('span');
  line.className = 'step-line intermediate';
  line.innerHTML = `<span class="eq-mark">=</span><span class="expr-text">${currentExprStr()}</span>`;
  list.appendChild(line);
  list.scrollTop = list.scrollHeight;
}

/* ---- Win screen ---- */
function showWin(answer, steps) {
  purgeGhost(); // ensure no ghost survives to overlay the win card
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.onclick = closeWin;
  document.body.appendChild(overlay);

  const card = document.createElement('div');
  card.className = 'win-card';
  card.innerHTML = `
    <div class="win-emoji">🎉</div>
    <div class="win-label">答えは</div>
    <div class="win-answer">${fmt(answer)}</div>
    <div class="win-steps">${steps} ステップで完成！</div>
    <div class="win-btns">
      <button class="win-btn win-btn-main" onclick="closeWin(); startGame()">もう一度</button>
      <button class="win-btn win-btn-sub" onclick="closeWin()">式を変える</button>
    </div>
  `;
  document.body.appendChild(card);
}

function closeWin() {
  document.querySelectorAll('.overlay, .win-card').forEach(el => el.remove());
}


/* ---- Random problem generator ---- */
function randInt(min, max) {
  return min + Math.floor(Math.random() * (max - min + 1));
}

function randNonZero(min, max) {
  let v = 0;
  while (v === 0) v = randInt(min, max);
  return v;
}

function generateProblem() {
  // ~40% chance: pow-based problem
  if (Math.random() < 0.4) {
    const powCount = randInt(1, 2);
    const simCount = randInt(1, Math.max(1, 4 - powCount - 1));
    const terms = [];
    for (let i = 0; i < powCount; i++) {
      const base = randNonZero(-4, 4);
      const exp  = Math.random() < 0.5 ? 2 : 3;
      terms.push({ type: 'pow', base, exp });
    }
    for (let i = 0; i < simCount; i++) {
      terms.push({ type: 'simple', value: randNonZero(-9, 9) });
    }
    for (let i = terms.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [terms[i], terms[j]] = [terms[j], terms[i]];
    }
    return terms.map((t, i) => {
      if (t.type === 'pow') {
        const baseStr = t.base < 0 ? `(${t.base})` : String(t.base);
        // 式の途中（i>0）では必ず + を付けて ( )( ) の連続を防ぐ
        return i === 0 ? `${baseStr}^${t.exp}` : `+${baseStr}^${t.exp}`;
      }
      return (t.value > 0 && i > 0) ? '+' + t.value : String(t.value);
    }).join('');
  }

  // ~20% chance: 符号問題（単独の＋/−と括弧の中の数）
  if (Math.random() < 0.20) {
    // suf(s): 整数 s を後ろに連結するときの文字列（+-3 を防ぐ）
    const suf = s => s >= 0 ? `+${s}` : `${s}`;

    const patterns = [
      // −(負) 系
      () => { const v = -randInt(1,9); const s = randNonZero(-9,9); return `-(${v})${suf(s)}`; },   // -(-4)+3
      () => { const s = randNonZero(-9,9); const v = -randInt(1,9); return `${s}-(${v})`; },          // 5-(-4)
      () => { const v = randInt(2,9);  const s = randNonZero(-9,9); return `-(+${v})${suf(s)}`; },   // -(+3)+5
      () => { const s = randNonZero(-9,9); const v = randInt(2,9);  return `${s}-(+${v})`; },         // 5-(+3)
      () => { const v1=-randInt(1,9); const v2=-randInt(1,9); const s=randNonZero(-9,9); return `-(${v1})-(${v2})${suf(s)}`; }, // -(-3)-(-2)+1
      // +(正) 系
      () => { const v = randInt(1,9);  const s = randNonZero(-9,9); return `+(+${v})${suf(s)}`; },   // +(+5)+3
      () => { const s = randNonZero(-9,9); const v = randInt(1,9);  return `${s}+(+${v})`; },         // 5+(+3)
      // +(負) 系
      () => { const v = -randInt(1,9); const s = randNonZero(-9,9); return `+(${v})${suf(s)}`; },    // +(-4)+3
      () => { const s = randNonZero(-9,9); const v = -randInt(1,9); return `${s}+(${v})`; },          // 5+(-3)
    ];
    const fn = patterns[Math.floor(Math.random() * patterns.length)];
    return fn();
  }

  // ~35% chance: fraction mul/div problem
  if (Math.random() < 0.35) {
    const validFracs = [
      {num:1,den:2},{num:1,den:3},{num:1,den:4},{num:1,den:5},
      {num:2,den:3},{num:2,den:5},
      {num:3,den:4},{num:3,den:5}
    ];
    const fracCount = randInt(1, 2);
    const simCount  = fracCount === 1 ? randInt(1, 2) : 0;
    const terms = [];
    for (let i = 0; i < fracCount; i++) {
      const frac = validFracs[Math.floor(Math.random() * validFracs.length)];
      const isDivFrac = Math.random() < 0.45; // 45%で÷(分数)、55%で×(分数)
      if (isDivFrac) {
        // left ÷ (num/den) = left × den/num → left が num の倍数になるよう生成
        let left;
        do {
          const k = randNonZero(-5, 5);
          left = k * frac.num;
        } while (Math.abs(left * frac.den / frac.num) > 20 || left === 0);
        terms.push({ type: 'mul', op: '÷', left, rightFrac: frac });
      } else {
        // left × (num/den) → left が den の倍数
        let left;
        do {
          const k = randNonZero(-5, 5);
          left = k * frac.den;
        } while (Math.abs(left * frac.num / frac.den) > 20 || left === 0);
        terms.push({ type: 'mul', op: '×', left, rightFrac: frac });
      }
    }
    for (let i = 0; i < simCount; i++) {
      terms.push({ type: 'simple', value: randNonZero(-9, 9) });
    }
    for (let i = terms.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [terms[i], terms[j]] = [terms[j], terms[i]];
    }
    return terms.map((t, i) => {
      if (t.type === 'mul' && t.rightFrac) {
        const l = (t.left > 0 && i > 0) ? '+' + t.left : String(t.left);
        return `${l}${t.op}(${t.rightFrac.num}/${t.rightFrac.den})`;
      }
      return (t.value > 0 && i > 0) ? '+' + t.value : String(t.value);
    }).join('');
  }

  // × terms: 1 or 2  (each uses 2 panels)
  // Simple terms fill remaining panels up to 4
  // mulCount=1 → simCount 1–2 (3–4 panels)
  // mulCount=2 → simCount 0   (4 panels exactly)
  const mulCount = randInt(1, 2);
  const simCount = mulCount === 1 ? randInt(1, 2) : 0;

  const terms = [];
  for (let i = 0; i < mulCount; i++) {
    const op = Math.random() < 0.5 ? '×' : '÷';
    if (op === '÷') {
      // Ensure clean (integer) division: left = right × result
      // Also avoid trivial ÷(±1) by requiring |right| ≥ 2
      let left, right, result;
      do {
        right  = randNonZero(-9, 9);
        result = randNonZero(-9, 9);
        left   = right * result;
      } while (Math.abs(right) === 1 || Math.abs(left) > 81);
      terms.push({ type: 'mul', op: '÷', left, right });
    } else {
      terms.push({ type: 'mul', op: '×', left: randNonZero(-9, 9), right: randNonZero(-9, 9) });
    }
  }
  for (let i = 0; i < simCount; i++) {
    terms.push({ type: 'simple', value: randNonZero(-9, 9) });
  }

  // Shuffle
  for (let i = terms.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [terms[i], terms[j]] = [terms[j], terms[i]];
  }

  return terms.map((t, i) => {
    if (t.type === 'mul') {
      const l = (t.left > 0 && i > 0) ? '+' + t.left : String(t.left);
      return `${l}${t.op}(${t.right})`; // use actual op (× or ÷)
    }
    return (t.value > 0 && i > 0) ? '+' + t.value : String(t.value);
  }).join('');
}

function generateAndStart() {
  const expr = generateProblem();
  document.getElementById('expr-input').value = expr;
  startGame();
}

/* ---- Init ---- */
startGame();
</script>
