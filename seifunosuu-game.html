/* Pow tile — colored tile with clickable exponent badge */
function createPowTileEl(tile, isNew) {
  const el = document.createElement('div');
  // negated タイル（-base^exp）は常に negative（赤）で表示
  const clr = tile.negated ? 'negative' : colorClass(tile.base);
  el.className = 'tile pow-tile ' + clr + (isNew ? ' new' : '');
  el.dataset.id = tile.id;

  // Base number display
  if (tile.negated) {
    el.textContent = '-' + tile.base;          // -2^3 → 表示: "-2"
  } else {
    el.textContent = tile.base < 0 ? '(' + tile.base + ')' : '+' + tile.base;
  }

  // Exponent badge
  const badge = document.createElement('span');
  badge.className = 'pow-exp-btn';
  badge.textContent = tile.exp === 2 ? '²' : '³';
  const expTitle = tile.negated ? `-${tile.base}^${tile.exp}` : `${tile.base}^${tile.exp}`;
  badge.title = `クリックして ${expTitle} を計算`;
  badge.addEventListener('click', (e) => {
    e.stopPropagation();
    animatePowExpand(tile.id);
  });
  el.appendChild(badge);

  el.addEventListener('click', (e) => {
    if (e.target === badge) return;
    showTooltip(el, '⚡ 指数をクリックして累乗を計算しよう！');
  });

  return el;
}

/* ---- 累乗展開アニメーション ---- */
function animatePowExpand(tileId) {
  const tileEl = document.querySelector(`.tile[data-id="${tileId}"]`);
  if (!tileEl) { resolvePow(tileId); return; }

  const idx = tiles.findIndex(t => t.id === tileId);
  if (idx === -1 || tiles[idx].type !== 'pow') return;

  const tile  = tiles[idx];
  const exp   = tile.exp; // 2 or 3
  const rect  = tileEl.getBoundingClientRect();
  // 括弧ありの負数: (base)、それ以外（正数・negated）: 符号なしで数字のみ表示
  const baseText = tile.base < 0 ? `(${tile.base})` : String(tile.base);
  const colorCls = tile.negated ? 'negative' : colorClass(tile.base);

  pushHistory();

  // 元タイルを非表示（レイアウトは維持）
  tileEl.style.visibility = 'hidden';
  tileEl.style.pointerEvents = 'none';

  const SPREAD   = 180; // 広がる時間 ms
  const PAUSE    = 180; // × を見せる停止時間 ms
  const COLLAPSE = 200; // 集まる時間 ms
  const gap = exp === 2 ? 80 : 64; // コピー間隔

  // exp 枚のコピーを元タイルの位置に重ねて生成
  // negated（括弧なし）の場合: 一番左のコピーだけ "-base"（赤）、残りは "base"（緑）
  const copies = [];
  for (let i = 0; i < exp; i++) {
    const copy = document.createElement('div');
    let copyText, copyCls;
    if (tile.base < 0) {
      // 括弧ありの負数: 全コピー同じ "(base)"
      copyText = baseText;
      copyCls  = colorCls;
    } else if (tile.negated) {
      // 括弧なし負符号（-2^3）: 左端だけ "-base"（赤）、残りは "base"（緑）
      copyText = i === 0 ? `-${tile.base}` : String(tile.base);
      copyCls  = i === 0 ? 'negative' : 'positive';
    } else {
      // 括弧なし正数（3^2, +2^3）: 左端だけ "+base"、残りは "base"（全て緑）
      copyText = i === 0 ? `+${tile.base}` : String(tile.base);
      copyCls  = colorCls;
    }
    copy.className = `tile ${copyCls}`;
    copy.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;z-index:900;margin:0;pointer-events:none;`;
    copy.textContent = copyText;
    document.body.appendChild(copy);
    copies.push(copy);
  }

  // exp-1 個の「×」サインを生成（カード境目に表示）
  const mulSigns = [];
  for (let i = 0; i < exp - 1; i++) {
    const sign = document.createElement('div');
    sign.style.cssText = `position:fixed;left:${rect.left + rect.width/2 - 17}px;top:${rect.top + rect.height/2 - 17}px;width:34px;height:34px;z-index:902;pointer-events:none;font-size:1.5em;font-weight:900;color:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;opacity:0;text-shadow:0 0 6px rgba(167,139,250,0.95);`;
    sign.textContent = '×';
    document.body.appendChild(sign);
    mulSigns.push(sign);
  }

  // Phase 1: exp 枚に広がる
  requestAnimationFrame(() => requestAnimationFrame(() => {
    copies.forEach((copy, i) => {
      const offsetX = (i - (exp - 1) / 2) * gap;
      copy.style.transition = `transform ${SPREAD}ms cubic-bezier(0.34, 1.56, 0.64, 1)`;
      copy.style.transform  = `translateX(${offsetX}px)`;
    });
  }));

  // Phase 1.5: × サインをカードの境目にフェードイン
  setTimeout(() => {
    mulSigns.forEach((sign, i) => {
      const midX = (i + 0.5 - (exp - 1) / 2) * gap;
      sign.style.transition = `transform 80ms ease, opacity 80ms ease`;
      sign.style.transform  = `translateX(${midX}px)`;
      sign.style.opacity    = '1';
    });
  }, SPREAD - 40);

  // Phase 2: 中心に吸い寄せられて消える（× も同時にフェードアウト）
  setTimeout(() => {
    copies.forEach(copy => {
      copy.style.transition = `transform ${COLLAPSE}ms ease-in, opacity ${Math.round(COLLAPSE * 0.6)}ms ease-in ${Math.round(COLLAPSE * 0.4)}ms`;
      copy.style.transform  = 'translateX(0) scale(0.15)';
      copy.style.opacity    = '0';
    });
    mulSigns.forEach(sign => {
      sign.style.transition = `opacity ${Math.round(COLLAPSE * 0.5)}ms ease-in`;
      sign.style.opacity    = '0';
    });
  }, SPREAD + PAUSE);

  // Phase 3: コピーを削除して積タイルをポップイン
  setTimeout(() => {
    copies.forEach(c => c.remove());
    tileEl.style.visibility   = '';
    tileEl.style.pointerEvents = '';

    // negated: -(base^exp)、括弧あり op='-': -(base^exp)、通常: base^exp
    const rawResult = tile.negated ? -Math.pow(tile.base, tile.exp) : Math.pow(tile.base, tile.exp);
    const result    = (tile.base < 0 && tile.op === '-') ? -rawResult : rawResult;
    const newId  = idCtr++;
    stepCount++;
    tiles[idx] = { id: newId, type: 'simple', value: result };
    addIntermediate();
    render(newId);

    mulSigns.forEach(s => s.remove());
    if (tiles.length === 1 && tiles[0].type === 'simple') {
      setTimeout(() => showWin(tiles[0].value, stepCount), 550);
    }
  }, SPREAD + PAUSE + COLLAPSE + 50);
}

function resolvePow(tileId) {
  const idx = tiles.findIndex(t => t.id === tileId);
  if (idx === -1 || tiles[idx].type !== 'pow') return;
  const tile = tiles[idx];
  pushHistory();
  const rawResult = tile.negated ? -Math.pow(tile.base, tile.exp) : Math.pow(tile.base, tile.exp);
  const result    = (tile.base < 0 && tile.op === '-') ? -rawResult : rawResult;
  const newId = idCtr++;
  stepCount++;
  tiles[idx] = { id: newId, type: 'simple', value: result };
  addIntermediate();
  render(newId);
  if (tiles.length === 1 && tiles[0].type === 'simple') {
    setTimeout(() => showWin(tiles[0].value, stepCount), 550);
  }
}

/* Mul term → two separate-looking tiles + always-visible × connector */
function createMulSubEls(tile, isNew) {
  const animClass = isNew ? ' new' : '';
  const revClass  = tile.revealed ? ' mul-revealed' : '';

  const leftEl = document.createElement('div');
  leftEl.className = `tile ${colorClass(tile.left)} mul-sub${revClass}${animClass}`;
  leftEl.dataset.mulid   = tile.id;
  leftEl.dataset.mulpart = 'left';
  leftEl.textContent = fmt(tile.left);

  const rightEl = document.createElement('div');
  rightEl.dataset.mulid   = tile.id;
  rightEl.dataset.mulpart = 'right';
  if (tile.rightFrac) {
    const rfColor = tile.rightFrac.num < 0 ? 'negative' : 'positive';
    rightEl.className = `tile ${rfColor} mul-sub${revClass}${animClass}`;
    rightEl.style.display = 'flex';
    rightEl.style.alignItems = 'center';
    rightEl.style.gap = '2px';
    const isNegFrac = tile.rightFrac.num < 0;
    if (isNegFrac) {
      const lp = document.createElement('span');
      lp.textContent = '(';
      lp.style.cssText = 'font-size:1.1em;font-weight:900;line-height:1;';
      rightEl.appendChild(lp);
      const mline = document.createElement('span');
      mline.className = 'frac-minus-line';
      rightEl.appendChild(mline);
    }
    const frac = document.createElement('div');
    frac.className = 'frac-display';
    frac.innerHTML = `<span class="frac-num">${Math.abs(tile.rightFrac.num)}</span><span class="frac-den">${tile.rightFrac.den}</span>`;
    rightEl.appendChild(frac);
    if (isNegFrac) {
      const rp = document.createElement('span');
      rp.textContent = ')';
      rp.style.cssText = 'font-size:1.1em;font-weight:900;line-height:1;';
      rightEl.appendChild(rp);
    }
  } else if (tile.rightPow) {
    const rp = tile.rightPow;
    const powVal = rp.negated ? -Math.pow(rp.base, rp.exp) : Math.pow(rp.base, rp.exp);
    rightEl.className = `tile ${colorClass(powVal)} mul-sub pow-tile${revClass}${animClass}`;
    rightEl.style.cssText += 'position:relative;display:flex;align-items:center;gap:1px;';
    const needsParens = rp.negated || rp.base < 0;
    if (needsParens) {
      const lp = document.createElement('span');
      lp.textContent = '(';
      lp.style.cssText = 'font-size:0.95em;font-weight:900;line-height:1;';
      rightEl.appendChild(lp);
    }
    const baseSpan = document.createElement('span');
    baseSpan.textContent = rp.negated ? `-${Math.abs(rp.base)}` : String(rp.base);
    rightEl.appendChild(baseSpan);
    const badge = document.createElement('span');
    badge.className = 'pow-exp-btn';
    badge.textContent = rp.exp === 2 ? '²' : '³';
    badge.title = '指数をクリックして累乗を計算';
    // flex内では absolute を解除してインライン配置
    badge.style.cssText = 'position:static;font-size:0.6em;font-weight:900;cursor:pointer;' +
      'background:rgba(255,255,255,0.22);border-radius:4px;padding:1px 3px;line-height:1.35;' +
      'border:1.5px solid rgba(255,255,255,0.45);user-select:none;pointer-events:auto;align-self:flex-start;';
    badge.addEventListener('pointerdown', e => e.stopPropagation());
    badge.addEventListener('click', e => { e.stopPropagation(); animateRightPowExpand(tile.id); });
    if (rp.base < 0 && !rp.negated) {
      // (-6)²: 閉じカッコを先に付けてからバッジ → 式表示と一致
      const rp2 = document.createElement('span');
      rp2.textContent = ')';
      rp2.style.cssText = 'font-size:0.95em;font-weight:900;line-height:1;';
      rightEl.appendChild(rp2);
      rightEl.appendChild(badge);
    } else {
      // (-6²): バッジを先に、閉じカッコを後に
      rightEl.appendChild(badge);
      if (needsParens) {
        const rp2 = document.createElement('span');
        rp2.textContent = ')';
        rp2.style.cssText = 'font-size:0.95em;font-weight:900;line-height:1;';
        rightEl.appendChild(rp2);
      }
    }
    rightEl.addEventListener('click', e => {
      if (e.target === badge) return;
      showTooltip(rightEl, '⚡ 指数をクリックして累乗を計算しよう！');
    });
  } else {
    rightEl.className = `tile ${colorClass(tile.right)} mul-sub${revClass}`;
    rightEl.textContent = tile.right >= 0 ? String(tile.right) : `(${String(tile.right)})`;
  }

  [leftEl, rightEl].forEach(el => {
    el.addEventListener('pointerenter', () => highlightMulPair(tile.id, true));
    el.addEventListener('pointerleave', () => highlightMulPair(tile.id, false));
    el.addEventListener('pointerdown', onMulPartPointerDown, { passive: false });
  });

  // operator connector — always visible from the start
  const connEl = document.createElement('button');
  connEl.className = 'mul-connector-btn';
  connEl.dataset.mulid = tile.id;
  connEl.textContent = tile.op || '×';
  connEl.addEventListener('click', () => {
    const t = tiles.find(x => x.id === tile.id);
    if (t?.rightPow) {
      showTooltip(connEl, '⚡ 指数をクリックして累乗を計算しよう！');
      return;
    }
    if (t?.rightFrac && t?.op === '÷') {
      animateDivFracToMul(tile.id);          // ÷(分数) → フリップ → ×(逆数) → 約分へ
    } else if (t?.rightFrac && t.rightFrac.den === 1) {
      resolveMul(tile.id);                   // 分母が1なら即計算
    } else if (t?.rightFrac && gcdInt(Math.abs(t.left), t.rightFrac.den) === 1) {
      animateMulCollapse(tile.id);           // 約分なし（gcd=1）→ 通常の吸い寄せアニメ
    } else if (t?.rightFrac) {
      animateFractionResolve(tile.id);       // 約分あり → 約分アニメ
    } else if (t?.op === '÷' && t.left % t.right !== 0) {
      animateDivRotate(tile.id);   // 整数÷整数で答えが分数: スライドアニメ
    } else {
      animateMulCollapse(tile.id);  // 整数×整数: 吸い寄せアニメ
    }
  });

  return [leftEl, connEl, rightEl];
}

function highlightMulPair(mulId, on) {
  document.querySelectorAll(`.tile.mul-sub[data-mulid="${mulId}"]`).forEach(el =>
    el.classList.toggle('mul-highlighted', on)
  );
}

/* ---- Mul sub-tile interaction ---- */
function onMulPartPointerDown(e) {
  e.preventDefault();

  const mulId = parseInt(e.currentTarget.dataset.mulid);
  const tile  = tiles.find(t => t.id === mulId);
  if (!tile) return;

  // かっこグループが残っている場合はかっこを先に処理させる
  if (tiles.some(t => (t.type === 'group_mul' || t.type === 'group_right') && t.innerTiles.length > 1)) {
    document.querySelectorAll('.inner-tile').forEach(e => shakeEl(e));
    showTooltip(e.currentTarget, '⚡ （　）の中を先に計算しよう！');
    return;
  }

  // 累乗タイルが残っている場合は累乗を先に処理させる
  if (tiles.some(t => t.type === 'pow') || tile.rightPow) {
    document.querySelectorAll('.pow-exp-btn').forEach(el => flashExpBadge(el));
    showTooltip(e.currentTarget, '⚡ 指数をクリックして累乗を計算しよう！');
    return;
  }

  // Shake both parts together
  document.querySelectorAll(`.tile.mul-sub[data-mulid="${mulId}"]`).forEach(el => shakeEl(el));

  const tip = tile.op === '÷'
    ? '⚡ わり算処理しよう！（「÷」をクリック）'
    : tile.revealed
      ? '⚡ 「×」をクリックして計算しよう！'
      : '⚡ かけ算処理しよう！（「×」をクリック）';
  showTooltip(e.currentTarget, tip);

  // First time → highlight pair permanently
  if (!tile.revealed) {
    tile.revealed = true;
    document.querySelectorAll(`.tile.mul-sub[data-mulid="${mulId}"]`)
      .forEach(el => el.classList.add('mul-revealed'));
  }
}

function shakeEl(el) {
  el.animate([
    { transform: 'translateX(0)' },
    { transform: 'translateX(-7px) rotate(-2deg)' },
    { transform: 'translateX(7px)  rotate(2deg)' },
    { transform: 'translateX(-5px) rotate(-1deg)' },
    { transform: 'translateX(5px)  rotate(1deg)' },
    { transform: 'translateX(0)' }
  ], { duration: 450, easing: 'ease' });
}

/* 指数バッジ専用：拡大点滅（底タイルを揺らさない） */
function flashExpBadge(el) {
  el.animate([
    { transform: 'scale(1)',   boxShadow: '0 0 0px rgba(251,191,36,0)' },
    { transform: 'scale(1.8)', boxShadow: '0 0 10px rgba(251,191,36,1)' },
    { transform: 'scale(1)',   boxShadow: '0 0 4px  rgba(251,191,36,0.5)' },
    { transform: 'scale(1.6)', boxShadow: '0 0 8px  rgba(251,191,36,0.8)' },
    { transform: 'scale(1)',   boxShadow: '0 0 0px  rgba(251,191,36,0)' },
  ], { duration: 550, easing: 'ease-in-out' });
}

function showTooltip(anchorEl, message) {
  const bar = document.getElementById('hint-bar');
  if (!bar) return;

  bar.textContent = message;
  bar.classList.add('active');

  // 「指数」が含まれるヒントのとき → 指数バッジを点滅（底タイルは触らない）
  if (message.includes('指数')) {
    document.querySelectorAll('.pow-exp-btn').forEach(el => flashExpBadge(el));
  }

  clearTimeout(bar._hideTimer);
  bar._hideTimer = setTimeout(() => {
    bar.classList.remove('active');
    bar.textContent = '';
  }, 2400);
}

/* ---- ÷(分数) → ×(逆数) フリップアニメーション ---- */
function animateDivFracToMul(tileId) {
  const tile = tiles.find(t => t.id === tileId);
  if (!tile || !tile.rightFrac || tile.op !== '÷') return;

  const connEl  = document.querySelector(`.mul-connector-btn[data-mulid="${tileId}"]`);
  const rightEl = document.querySelector(`.tile.mul-sub[data-mulid="${tileId}"][data-mulpart="right"]`);
  if (!connEl || !rightEl) return;

  pushHistory();

  const HALF = 220; // ms

  // --- スクイッシュ（つぶす）フェーズ ---
  [connEl, rightEl].forEach(el => {
    el.style.transition     = `transform ${HALF}ms ease-in`;
    el.style.transformOrigin = 'center center';
  });
  // 次フレームで変形を開始
  requestAnimationFrame(() => requestAnimationFrame(() => {
    connEl.style.transform  = 'scaleY(0)';
    rightEl.style.transform = 'scaleY(0)';
  }));

  // 逆数を計算: p/q の逆数は q/p。p<0 なら符号を分子に寄せて分母は正に保つ
  const invSign = tile.rightFrac.num < 0 ? -1 : 1;
  const invNum  = invSign * tile.rightFrac.den;       // 符号維持した分子
  const invDen  = Math.abs(tile.rightFrac.num);        // 常に正の分母

  // --- 中間点（scaleY=0）: カードをスクイッシュ中に再構築 ---
  setTimeout(() => {
    // ÷ → ×
    connEl.textContent = '×';

    // 分数カードを逆数で再構築（scaleY=0 なので見えない状態）
    const isNeg = invNum < 0;
    rightEl.className = rightEl.className.replace(/\b(positive|negative)\b/, isNeg ? 'negative' : 'positive');
    rightEl.style.cssText += 'display:flex;align-items:center;gap:2px;';
    rightEl.innerHTML = '';
    if (isNeg) {
      const lp = document.createElement('span');
      lp.textContent = '(';
      lp.style.cssText = 'font-size:1.1em;font-weight:900;line-height:1;';
      rightEl.appendChild(lp);
      const ml = document.createElement('span');
      ml.className = 'frac-minus-line';
      rightEl.appendChild(ml);
    }
    const fd = document.createElement('div');
    fd.className = 'frac-display';
    fd.innerHTML = `<span class="frac-num">${Math.abs(invNum)}</span><span class="frac-den">${invDen}</span>`;
    rightEl.appendChild(fd);
    if (isNeg) {
      const rp = document.createElement('span');
      rp.textContent = ')';
      rp.style.cssText = 'font-size:1.1em;font-weight:900;line-height:1;';
      rightEl.appendChild(rp);
    }

    // --- 展開フェーズ ---
    [connEl, rightEl].forEach(el => {
      el.style.transition = `transform ${HALF}ms ease-out`;
      el.style.transform  = 'scaleY(1)';
    });
  }, HALF + 10);

  // --- 完了: データモデルを更新 ---
  setTimeout(() => {
    const idx = tiles.findIndex(t => t.id === tileId);
    if (idx === -1) return;
    tiles[idx] = {
      id:        tile.id,
      type:      'mul',
      op:        '×',
      left:      tile.left,
      rightFrac: { num: invNum, den: invDen },
      revealed:  true
    };
    // トランジションを外してクリーンアップ（再レンダリングは不要: DOM は正しい状態）
    [connEl, rightEl].forEach(el => {
      el.style.transition     = '';
      el.style.transform      = '';
      el.style.transformOrigin = '';
    });
    // ステップログに ÷→× を記録
    stepCount++;
    addIntermediate();
  }, HALF * 2 + 30);
}

/* ---- Fraction slash animation ---- */
function animateFractionResolve(tileId) {
  const tile = tiles.find(t => t.id === tileId);
  if (!tile?.rightFrac) { resolveMul(tileId); return; }

  const leftEl  = document.querySelector(`.tile.mul-sub[data-mulid="${tileId}"][data-mulpart="left"]`);
  const rightEl = document.querySelector(`.tile.mul-sub[data-mulid="${tileId}"][data-mulpart="right"]`);
  if (!leftEl || !rightEl) { resolveMul(tileId); return; }
  pushHistory();

  function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }
  const g           = gcd(Math.abs(tile.left), tile.rightFrac.den);
  const leftReduced = tile.left / g;
  const numVal      = tile.rightFrac.num;

  // Slash overlay: covers `coverEl`, line geometrically passes through center of `targetEl`.
  // The slash-line rotates -38deg around its left end (transform-origin: left center).
  // For the line to cross point (tx, ty) in overlay coords:
  //   ty = lineTop - (tx - lineLeftX) * tan(38deg)
  //   → lineTop = ty + (tx - lineLeftX) * tan(38deg)
  function addSlash(coverEl, targetEl, pad = 8) {
    const cr = coverEl.getBoundingClientRect();
    const tr = targetEl.getBoundingClientRect();
    const oW = cr.width  + pad * 2;
    const oH = cr.height + pad * 2;

    const wrap = document.createElement('div');
    wrap.className = 'slash-overlay';
    wrap.style.cssText = `left:${cr.left - pad}px;top:${cr.top - pad}px;width:${oW}px;height:${oH}px;`;

    const line = document.createElement('div');
    line.className = 'slash-line';

    // Target center in overlay coords
    const tx = (tr.left + tr.width  / 2) - (cr.left - pad);
    const ty = (tr.top  + tr.height / 2) - (cr.top  - pad);

    // Left end of slash-line in overlay coords (CSS: left: -15%)
    const lineLeftX = -0.15 * oW;
    const tan38 = Math.tan(38 * Math.PI / 180); // ≈ 0.781

    // lineTop so the "/" line passes through (tx, ty)
    const lineTop = ty + (tx - lineLeftX) * tan38;

    line.style.top      = lineTop + 'px';
    line.style.marginTop = '0';
    wrap.appendChild(line);
    document.body.appendChild(wrap);
    return wrap;
  }

  const denEl = rightEl.querySelector('.frac-den');

  // Phase 1: left tile → line at card center / fraction card → line at denominator position
  const s1 = addSlash(leftEl, leftEl, 8);           // slash centered on integer card
  const s2 = addSlash(rightEl, denEl || rightEl, 8); // slash covers fraction card, hits denominator

  // dim the slashed numbers
  leftEl.style.transition = 'opacity 0.2s 0.12s';
  leftEl.style.opacity    = '0.2';
  if (denEl) { denEl.style.transition = 'opacity 0.2s 0.12s'; denEl.style.opacity = '0.1'; }

  // Phase 2 (380ms): slashes fade → show reduced values
  setTimeout(() => {
    s1.remove(); s2.remove();
    leftEl.style.opacity = ''; leftEl.style.transition = '';
    if (denEl) { denEl.style.opacity = ''; denEl.style.transition = ''; }

    // Update left tile display to reduced value
    leftEl.textContent = fmt(leftReduced);
    leftEl.classList.remove('reduced-pop'); void leftEl.offsetWidth; leftEl.classList.add('reduced-pop');

    // Update right tile: 分母が1になった場合も「numVal/1」の分数形式で表示
    rightEl.innerHTML = '';
    rightEl.style.display = 'flex';
    rightEl.style.alignItems = 'center';
    rightEl.style.gap = '2px';
    const isNegNum = numVal < 0;
    if (isNegNum) {
      const lp = document.createElement('span');
      lp.textContent = '(';
      lp.style.cssText = 'font-size:1.1em;font-weight:900;line-height:1;';
      rightEl.appendChild(lp);
      const mline = document.createElement('span');
      mline.className = 'frac-minus-line';
      rightEl.appendChild(mline);
    }
    const fd2 = document.createElement('div');
    fd2.className = 'frac-display';
    const finalDen2 = tile.rightFrac.den / g;
    fd2.innerHTML = `<span class="frac-num">${Math.abs(numVal)}</span><span class="frac-den">${finalDen2}</span>`;
    rightEl.appendChild(fd2);
    if (isNegNum) {
      const rp = document.createElement('span');
      rp.textContent = ')';
      rp.style.cssText = 'font-size:1.1em;font-weight:900;line-height:1;';
      rightEl.appendChild(rp);
    }
    rightEl.classList.remove('reduced-pop'); void rightEl.offsetWidth; rightEl.classList.add('reduced-pop');
  }, 380);

  // Phase 3 (800ms): 結果を確定
  setTimeout(() => {
    const idx = tiles.findIndex(t => t.id === tileId);
    if (idx === -1) return;
    const finalNum = leftReduced * numVal;
    const finalDen = tile.rightFrac.den / g;
    if (finalDen > 1 && g > 1) {
      // 約分が起きて結果がまだ分数 → 中間状態の mul タイルで止める（もう一度×で分数確定）
      tiles[idx] = { id: tile.id, type: 'mul', op: '×', left: leftReduced,
        rightFrac: { num: numVal, den: finalDen }, revealed: true };
      stepCount++;
      addIntermediate();
      render();
    } else if (finalDen > 1) {
      // 約分なし（g===1）・結果が分数 → 直接分数タイルへ
      const frac  = makeFrac(finalNum, finalDen);
      const newId = idCtr++;
      tiles[idx]  = { id: newId, type: 'frac', num: frac.num, den: frac.den };
      stepCount++;
      addIntermediate();
      render(newId);
      if (tiles.length === 1) setTimeout(() => showWin(null, stepCount, frac), 550);
    } else {
      // 分母が1 → leftReduced × (numVal/1) の形で次ステップへ（もう一度×で整数）
      tiles[idx] = { id: tile.id, type: 'mul', op: '×', left: leftReduced,
        rightFrac: { num: numVal, den: 1 }, revealed: true };
      stepCount++;
      addIntermediate();
      render();
    }
  }, 800);
}

/* ---- 整数÷整数 分数位置スライドアニメーション ---- */
function animateDivRotate(tileId) {
  const leftEl  = document.querySelector(`.tile.mul-sub[data-mulid="${tileId}"][data-mulpart="left"]`);
  const connEl  = document.querySelector(`.mul-connector-btn[data-mulid="${tileId}"]`);
  const rightEl = document.querySelector(`.tile.mul-sub[data-mulid="${tileId}"][data-mulpart="right"]`);
  if (!leftEl || !connEl || !rightEl) { resolveMul(tileId); return; }

  const idx = tiles.findIndex(t => t.id === tileId);
  if (idx === -1 || tiles[idx].type !== 'mul') return;
  pushHistory();

  const tile = tiles[idx];

  // スタイル変更前に位置を取得
  const lRect = leftEl.getBoundingClientRect();
  const cRect = connEl.getBoundingClientRect();
  const rRect = rightEl.getBoundingClientRect();

  const cx = cRect.left + cRect.width  / 2;
  const cy = cRect.top  + cRect.height / 2;

  const TILE_H = Math.max(lRect.height, rRect.height);
  const GAP    = 6;
  const BAR_H  = 3;
  const BAR_W  = Math.max(lRect.width, rRect.width) + 24;

  const numCY = cy - BAR_H / 2 - GAP - TILE_H / 2;
  const denCY = cy + BAR_H / 2 + GAP + TILE_H / 2;

  const lDX = cx - (lRect.left + lRect.width  / 2);
  const lDY = numCY - (lRect.top  + lRect.height / 2);
  const rDX = cx - (rRect.left + rRect.width  / 2);
  const rDY = denCY - (rRect.top  + rRect.height / 2);

  // 各要素を position:fixed に切り替えて body に移動
  // （position:fixed にすると flow から外れるので、body に移してもレイアウト変化なし）
  function liftToFixed(el, rect) {
    el.style.animation  = 'none';      // pop-in 等のアニメーション停止
    el.style.transition = 'none';      // CSS transition 停止
    el.style.transform  = 'translate(0,0)';
    el.style.position   = 'fixed';
    el.style.left       = rect.left   + 'px';
    el.style.top        = rect.top    + 'px';
    el.style.width      = rect.width  + 'px';
    el.style.height     = rect.height + 'px';
    el.style.margin     = '0';
    el.style.zIndex     = '901';
    document.body.appendChild(el);  // DOM 上の親を body に移動
  }

  liftToFixed(leftEl,  lRect);
  liftToFixed(connEl,  cRect);
  liftToFixed(rightEl, rRect);

  // 分数の横棒
  const barEl = document.createElement('div');
  barEl.style.position     = 'fixed';
  barEl.style.left         = (cx - BAR_W / 2) + 'px';
  barEl.style.top          = (cy - BAR_H / 2) + 'px';
  barEl.style.width        = BAR_W + 'px';
  barEl.style.height       = BAR_H + 'px';
  barEl.style.background   = '#e2e8f0';
  barEl.style.borderRadius = '2px';
  barEl.style.zIndex       = '901';
  barEl.style.opacity      = '0';
  barEl.style.transition   = 'none';
  document.body.appendChild(barEl);

  const SLIDE = 200;
  const HOLD  = 280;
  const FADE  = 160;

  // CSS transition を使わず JS の rAF ループで直接 transform を更新
  // → 要素の CSS 状態に依存しないため初回から確実に動く
  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  const startTime = performance.now();

  // ÷ フェードアウト（opacity は CSS transition で OK）
  void connEl.offsetWidth;
  connEl.style.transition = `opacity ${Math.round(SLIDE * 0.35)}ms ease-out`;
  connEl.style.opacity    = '0';

  // 横棒フェードイン
  setTimeout(() => {
    barEl.style.transition = `opacity ${Math.round(SLIDE * 0.5)}ms ease-in`;
    barEl.style.opacity    = '1';
  }, Math.round(SLIDE * 0.3));

  // 左右タイルを rAF ループで移動
  (function animStep(now) {
    const t = Math.min((now - startTime) / SLIDE, 1);
    const e = easeInOut(t);
    leftEl.style.transform  = `translate(${lDX * e}px,${lDY * e}px)`;
    rightEl.style.transform = `translate(${rDX * e}px,${rDY * e}px)`;
    if (t < 1) requestAnimationFrame(animStep);
  })(performance.now());

  // HOLD 後にフェードアウト → 結果タイル表示
  setTimeout(() => {
    [leftEl, rightEl, barEl].forEach(el => {
      el.style.transition = `opacity ${FADE}ms ease-out`;
      el.style.opacity    = '0';
    });

    setTimeout(() => {
      [leftEl, rightEl, connEl, barEl].forEach(el => el.remove());

      // 非整数除算 → 分数タイル
      if (tile.right !== 0 && tile.left % tile.right !== 0) {
        const frac  = makeFrac(tile.left, tile.right);
        const newId = idCtr++;
        stepCount++;
        tiles[idx] = { id: newId, type: 'frac', num: frac.num, den: frac.den };
        addIntermediate();
        render(newId);
        if (tiles.length === 1) setTimeout(() => showWin(null, stepCount, frac), 550);
        return;
      }

      const result = tile.left / tile.right;
      const newId  = idCtr++;
      stepCount++;
      tiles[idx] = { id: newId, type: 'simple', value: result };
      addIntermediate();
      render(newId);
      if (tiles.length === 1 && tiles[0].type === 'simple') {
        setTimeout(() => showWin(tiles[0].value, stepCount), 550);
      }
    }, FADE + 20);
  }, SLIDE + HOLD);
}

/* ---- 整数×整数 吸い寄せアニメーション ---- */
function animateMulCollapse(tileId) {
  const leftEl  = document.querySelector(`.tile.mul-sub[data-mulid="${tileId}"][data-mulpart="left"]`);
  const connEl  = document.querySelector(`.mul-connector-btn[data-mulid="${tileId}"]`);
  const rightEl = document.querySelector(`.tile.mul-sub[data-mulid="${tileId}"][data-mulpart="right"]`);
  if (!leftEl || !connEl || !rightEl) { resolveMul(tileId); return; }

  const idx = tiles.findIndex(t => t.id === tileId);
  if (idx === -1 || tiles[idx].type !== 'mul') return;
  pushHistory();

  const SLIDE = 200; // ms

  // コネクターの中心座標を基準にそれぞれの移動量を計算
  const connCX  = connEl.getBoundingClientRect().left + connEl.getBoundingClientRect().width  / 2;
  const connCY  = connEl.getBoundingClientRect().top  + connEl.getBoundingClientRect().height / 2;
  const leftCX  = leftEl.getBoundingClientRect().left  + leftEl.getBoundingClientRect().width  / 2;
  const rightCX = rightEl.getBoundingClientRect().left + rightEl.getBoundingClientRect().width / 2;
  const leftDX  = connCX - leftCX;
  const rightDX = connCX - rightCX;

  // 操作を受け付けないようにする
  [leftEl, connEl, rightEl].forEach(el => el.style.pointerEvents = 'none');

  // 吸い寄せトランジション設定
  [leftEl, rightEl].forEach(el => {
    el.style.transition = `transform ${SLIDE}ms ease-in, opacity ${SLIDE}ms ease-in`;
  });
  connEl.style.transition = `opacity ${SLIDE * 0.6}ms ease-in`;

  requestAnimationFrame(() => requestAnimationFrame(() => {
    leftEl.style.transform  = `translateX(${leftDX}px) scale(0.3)`;
    leftEl.style.opacity    = '0';
    rightEl.style.transform = `translateX(${rightDX}px) scale(0.3)`;
    rightEl.style.opacity   = '0';
    connEl.style.opacity    = '0';
  }));

  // 衝突後: 結果タイルをポップイン
  setTimeout(() => {
    const tile = tiles[idx];

    // 非整数の除算 → 分数タイル
    if (!tile.rightFrac && tile.op === '÷' && tile.right !== 0 && tile.left % tile.right !== 0) {
      const frac = makeFrac(tile.left, tile.right);
      const newId = idCtr++;
      stepCount++;
      tiles[idx] = { id: newId, type: 'frac', num: frac.num, den: frac.den };
      addIntermediate();
      render(newId);
      if (tiles.length === 1) setTimeout(() => showWin(null, stepCount, frac), 550);
      return;
    }

    // rightFrac で結果が非整数 → 分数タイル
    if (tile.rightFrac && (tile.left * tile.rightFrac.num) % tile.rightFrac.den !== 0) {
      const frac = makeFrac(tile.left * tile.rightFrac.num, tile.rightFrac.den);
      const newId = idCtr++;
      stepCount++;
      tiles[idx] = { id: newId, type: 'frac', num: frac.num, den: frac.den };
      addIntermediate();
      render(newId);
      if (tiles.length === 1) setTimeout(() => showWin(null, stepCount, frac), 550);
      return;
    }

    const result = tile.rightFrac
      ? tile.left * tile.rightFrac.num / tile.rightFrac.den
      : tile.op === '÷' ? tile.left / tile.right : tile.left * tile.right;
    const newId = idCtr++;
    stepCount++;
    tiles[idx] = { id: newId, type: 'simple', value: result };
    addIntermediate();
    render(newId);

    if (tiles.length === 1) {
      const last = tiles[0];
      if (last.type === 'simple') setTimeout(() => showWin(last.value, stepCount), 550);
      else if (last.type === 'frac') setTimeout(() => showWin(null, stepCount, { num: last.num, den: last.den }), 550);
    }
  }, SLIDE + 20);
}

/* ---- mul の右辺にある累乗の展開アニメーション ---- */
function animateRightPowExpand(tileId) {
  const rightEl = document.querySelector(`.tile[data-mulid="${tileId}"][data-mulpart="right"]`);
  if (!rightEl) { resolveRightPow(tileId); return; }

  const idx = tiles.findIndex(t => t.id === tileId);
  if (idx === -1 || !tiles[idx].rightPow) return;

  const tile = tiles[idx];
  const rp   = tile.rightPow;
  const exp  = rp.exp;
  const rect = rightEl.getBoundingClientRect();

  pushHistory();

  // 元タイルを非表示（レイアウトは維持）
  rightEl.style.visibility   = 'hidden';
  rightEl.style.pointerEvents = 'none';

  const SPREAD   = 180;
  const PAUSE    = 180;
  const COLLAPSE = 200;
  const gap = exp === 2 ? 80 : 64;

  // animatePowExpand と同じロジックでコピーを生成
  const copies = [];
  for (let i = 0; i < exp; i++) {
    const copy = document.createElement('div');
    let copyText, copyCls;
    if (rp.base < 0) {
      copyText = `(${rp.base})`; copyCls = 'negative';
    } else if (rp.negated) {
      copyText = i === 0 ? `-${rp.base}` : String(rp.base);
      copyCls  = i === 0 ? 'negative' : 'positive';
    } else {
      copyText = i === 0 ? `+${rp.base}` : String(rp.base);
      copyCls  = 'positive';
    }
    copy.className = `tile ${copyCls}`;
    copy.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;z-index:900;margin:0;pointer-events:none;`;
    copy.textContent = copyText;
    document.body.appendChild(copy);
    copies.push(copy);
  }

  // × サイン
  const mulSigns = [];
  for (let i = 0; i < exp - 1; i++) {
    const sign = document.createElement('div');
    sign.style.cssText = `position:fixed;left:${rect.left + rect.width/2 - 17}px;top:${rect.top + rect.height/2 - 17}px;width:34px;height:34px;z-index:902;pointer-events:none;font-size:1.5em;font-weight:900;color:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;opacity:0;text-shadow:0 0 6px rgba(167,139,250,0.95);`;
    sign.textContent = '×';
    document.body.appendChild(sign);
    mulSigns.push(sign);
  }

  // Phase 1: exp 枚に広がる
  requestAnimationFrame(() => requestAnimationFrame(() => {
    copies.forEach((copy, i) => {
      const offsetX = (i - (exp - 1) / 2) * gap;
      copy.style.transition = `transform ${SPREAD}ms cubic-bezier(0.34, 1.56, 0.64, 1)`;
      copy.style.transform  = `translateX(${offsetX}px)`;
    });
  }));

  // Phase 1.5: × フェードイン
  setTimeout(() => {
    mulSigns.forEach((sign, i) => {
      const midX = (i + 0.5 - (exp - 1) / 2) * gap;
      sign.style.transition = `transform 80ms ease, opacity 80ms ease`;
      sign.style.transform  = `translateX(${midX}px)`;
      sign.style.opacity    = '1';
    });
  }, SPREAD - 40);

  // Phase 2: 中心に吸い寄せられて消える（× も同時にフェードアウト）
  setTimeout(() => {
    copies.forEach(copy => {
      copy.style.transition = `transform ${COLLAPSE}ms ease-in, opacity ${Math.round(COLLAPSE * 0.6)}ms ease-in ${Math.round(COLLAPSE * 0.4)}ms`;
      copy.style.transform  = 'translateX(0) scale(0.15)';
      copy.style.opacity    = '0';
    });
    mulSigns.forEach(sign => {
      sign.style.transition = `opacity ${Math.round(COLLAPSE * 0.5)}ms ease-in`;
      sign.style.opacity    = '0';
    });
  }, SPREAD + PAUSE);

  // Phase 3: コピーを削除してタイル状態を更新
  setTimeout(() => {
    copies.forEach(c => c.remove());
    mulSigns.forEach(s => s.remove());
    const powVal = rp.negated ? -Math.pow(rp.base, rp.exp) : Math.pow(rp.base, rp.exp);
    tile.right = powVal;
    delete tile.rightPow;
    stepCount++;
    addIntermediate();
    render();
  }, SPREAD + PAUSE + COLLAPSE + 50);
}

/* ---- mul の右辺にある累乗を解決（アニメなし fallback） ---- */
function resolveRightPow(tileId) {
  const idx = tiles.findIndex(t => t.id === tileId);
  if (idx === -1) return;
  const tile = tiles[idx];
  if (!tile.rightPow) return;
  pushHistory();
  const rp = tile.rightPow;
  const powVal = rp.negated ? -Math.pow(rp.base, rp.exp) : Math.pow(rp.base, rp.exp);
  tile.right = powVal;
  delete tile.rightPow;
  stepCount++;
  addIntermediate();
  render();
}

function resolveMul(tileId) {
  const idx = tiles.findIndex(t => t.id === tileId);
  if (idx === -1 || tiles[idx].type !== 'mul') return;
  const tile = tiles[idx];
  pushHistory();

  // 非整数の除算 → 分数タイル
  if (!tile.rightFrac && tile.op === '÷' && tile.right !== 0 && tile.left % tile.right !== 0) {
    const frac = makeFrac(tile.left, tile.right);
    const newId = idCtr++;
    stepCount++;
    tiles[idx] = { id: newId, type: 'frac', num: frac.num, den: frac.den };
    addIntermediate();
    render(newId);
    if (tiles.length === 1) setTimeout(() => showWin(null, stepCount, frac), 550);
    return;
  }

  const result = tile.rightFrac
    ? tile.left * tile.rightFrac.num / tile.rightFrac.den
    : tile.op === '÷' ? tile.left / tile.right : tile.left * tile.right;
  const newId  = idCtr++;
  stepCount++;

  tiles[idx] = { id: newId, type: 'simple', value: result };
  addIntermediate();
  render(newId);

  if (tiles.length === 1 && tiles[0].type === 'simple') {
    setTimeout(() => showWin(tiles[0].value, stepCount), 550);
  }
}

/* ---- Drag via Pointer Events (simple tiles only) ---- */
function onPointerDown(e) {
  if (e.button !== undefined && e.button !== 0) return;

  const el = e.currentTarget;

  if (tiles.some(t => (t.type === 'group_mul' || t.type === 'group_right') && t.innerTiles.length > 1)) {
    document.querySelectorAll('.inner-tile').forEach(e => shakeEl(e));
    showTooltip(el, '⚡ （　）の中を先に計算しよう！');
    return;
  }

  // pow タイルは独立しているため、simple タイル同士のドラッグはブロックしない
  // （累乗バッジをクリックすれば個別に解決できる）


  if (tiles.some(t => t.type === 'sign')) {
    tiles.filter(t => t.type === 'sign').forEach(t => {
      const signEl = document.querySelector(`.sign-tile-btn[data-id="${t.id}"]`);
      if (signEl) shakeEl(signEl);
      const signIdx = tiles.findIndex(x => x.id === t.id);
      const valTile = tiles[signIdx + 1];
      if (valTile) {
        const valEl = document.querySelector(`.tile[data-id="${valTile.id}"]`);
        if (valEl) shakeEl(valEl);
      }
    });
    showTooltip(el, '⚡ （　）の左にある ＋ / − をクリックして符号を統合しよう！');
    return;
  }

  // ここから実際のドラッグ開始
  e.preventDefault();

  dragId = parseInt(el.dataset.id);
  const tile = tiles.find(t => t.id === dragId);
  if (!tile || tile.type !== 'simple') return;

  el.setPointerCapture(e.pointerId);

  const s = tileStyle(tile.value);
  ghostEl = document.createElement('div');
  ghostEl.className = 'ghost';
  ghostEl.textContent = fmt(tile.value);
  ghostEl.style.background  = s.bg;
  ghostEl.style.borderColor = s.border;
  ghostEl.style.color       = s.text;
  ghostEl.style.boxShadow   = `0 16px 48px ${s.shadow}`;
  document.body.appendChild(ghostEl);

  el.classList.add('dragging');
  positionGhost(e.clientX, e.clientY);

  el.addEventListener('pointermove',       onPointerMove,  { passive: false });
  el.addEventListener('pointerup',         onPointerUp);
  el.addEventListener('pointercancel',     onPointerCancel);
  el.addEventListener('lostpointercapture', () => { endDrag(el); dragId = null; });
}

function positionGhost(x, y) {
  if (!ghostEl) return;
  ghostEl.style.left = (x - 48) + 'px';
  ghostEl.style.top  = (y - 48) + 'px';
}

function onPointerMove(e) {
  e.preventDefault();
  positionGhost(e.clientX, e.clientY);
  document.querySelectorAll('.tile.drop-target').forEach(el => el.classList.remove('drop-target'));
  // ゴーストの中心点だけでなく、ゴーストの矩形で重なっているタイルを探す
  const under = tileUnderGhost() || tileUnderPoint(e.clientX, e.clientY);
  if (under) {
    under.classList.add('drop-target');
    hoveredTargetId = parseInt(under.dataset.id);
  } else {
    hoveredTargetId = null;
  }
}

function onPointerUp(e) {
  e.preventDefault();
  // ハイライト中の要素を優先、なければポインター位置で再判定
  const targetId = hoveredTargetId ?? (() => {
    const under = tileUnderPoint(e.clientX, e.clientY);
    return under ? parseInt(under.dataset.id) : null;
  })();
  hoveredTargetId = null;
  endDrag(e.currentTarget);

  if (targetId !== null && targetId !== dragId) {
    combine(dragId, targetId); dragId = null; return;
  }
  dragId = null;
}

function onPointerCancel(e) { endDrag(e.currentTarget); dragId = null; }

function endDrag(el) {
  el.classList.remove('dragging');
  el.removeEventListener('pointermove',   onPointerMove);
  el.removeEventListener('pointerup',     onPointerUp);
  el.removeEventListener('pointercancel', onPointerCancel);
  document.querySelectorAll('.tile.drop-target').forEach(t => t.classList.remove('drop-target'));
  hoveredTargetId = null;
  purgeGhost();
}

/* Forcefully remove any floating ghost elements and dragging classes */
function purgeGhost() {
  document.querySelectorAll('.ghost').forEach(el => el.remove());
  ghostEl = null;
  document.querySelectorAll('.tile.dragging').forEach(el => el.classList.remove('dragging'));
}

/* ゴーストの矩形と最も重なっているタイルを返す（重なりがあれば光っている＝ドロップ可） */
function tileUnderGhost() {
  if (!ghostEl) return null;
  const gr = ghostEl.getBoundingClientRect();
  let bestEl = null, bestArea = 0;
  document.querySelectorAll('.tile:not(.mul-sub):not(.dragging)').forEach(el => {
    const id = parseInt(el.dataset.id);
    if (id === dragId || isNaN(id)) return;
    const tr = el.getBoundingClientRect();
    const ox = Math.max(0, Math.min(gr.right, tr.right) - Math.max(gr.left, tr.left));
    const oy = Math.max(0, Math.min(gr.bottom, tr.bottom) - Math.max(gr.top, tr.top));
    const area = ox * oy;
    if (area > bestArea) { bestArea = area; bestEl = el; }
  });
  // 重なりが ghost 面積の 20% 以上あればドロップ対象とみなす
  const ghostArea = gr.width * gr.height;
  return bestArea >= ghostArea * 0.20 ? bestEl : null;
}

/* Only simple tiles are valid drop targets */
function tileUnderPoint(x, y) {
  if (ghostEl) ghostEl.style.display = 'none';
  const el = document.elementFromPoint(x, y);
  if (ghostEl) ghostEl.style.display = '';
  if (!el) return null;
  const tileEl = el.closest('.tile:not(.mul-sub)');
  if (tileEl && parseInt(tileEl.dataset.id) !== dragId) return tileEl;
  return null;
}

/* ---- Combine (addition) ---- */
function combine(fromId, toId) {
  purgeGhost();
  pushHistory();
  const fromIdx = tiles.findIndex(t => t.id === fromId);
  const toIdx   = tiles.findIndex(t => t.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;

  const from = tiles[fromIdx];
  const to   = tiles[toIdx];

  // 有理数値を {num, den} で取得（simple は den=1 の分数として扱う）
  function rval(t) {
    if (t.type === 'simple') return { num: t.value, den: 1 };
    if (t.type === 'frac')   return { num: t.num,   den: t.den };
    return null;
  }
  const rv1 = rval(from);
  const rv2 = rval(to);
  if (!rv1 || !rv2) return;

  // 分数加算: a/b + c/d = (a*d + c*b)/(b*d) → 約分
  const sumRaw = makeFrac(rv1.num * rv2.den + rv2.num * rv1.den, rv1.den * rv2.den);
  const newId  = idCtr++;
  stepCount++;

  const keepIdx   = Math.min(fromIdx, toIdx);
  const removeIdx = Math.max(fromIdx, toIdx);

  // ---- 和が０ ----
  if (sumRaw.num === 0) {
    tiles[keepIdx] = { id: newId, type: 'simple', value: 0 };
    tiles.splice(removeIdx, 1);
    render(newId);

    if (tiles.length === 1) {
      addIntermediate();
      setTimeout(() => showWin(0, stepCount), 600);
      return;
    }

    setTimeout(() => {
      const zeroEl = document.querySelector(`.tile[data-id="${newId}"]`);
      if (zeroEl) zeroEl.classList.add('zero-vanish');
    }, 420);

    setTimeout(() => {
      const idx = tiles.findIndex(t => t.id === newId);
      if (idx === -1) return;
      tiles.splice(idx, 1);
      render();
      const last = tiles[0];
      if (tiles.length === 1) {
        if (last.type === 'simple') setTimeout(() => showWin(last.value, stepCount), 550);
        else if (last.type === 'frac') setTimeout(() => showWin(null, stepCount, { num: last.num, den: last.den }), 550);
      }
    }, 1000);
    return;
  }

  // ---- 整数結果 ----
  if (sumRaw.den === 1) {
    tiles[keepIdx] = { id: newId, type: 'simple', value: sumRaw.num };
  } else {
    // ---- 分数結果 ----
    tiles[keepIdx] = { id: newId, type: 'frac', num: sumRaw.num, den: sumRaw.den };
  }
  tiles.splice(removeIdx, 1);

  addIntermediate();
  render(newId);

  if (tiles.length === 1) {
    const last = tiles[0];
    if (last.type === 'simple') {
      setTimeout(() => showWin(last.value, stepCount), 550);
    } else if (last.type === 'frac') {
      setTimeout(() => showWin(null, stepCount, { num: last.num, den: last.den }), 550);
    }
  }
}

/* ---- Current expression string from tiles ---- */
function currentExprStr() {
  const parts = [];
  let i = 0;
  while (i < tiles.length) {
    const t = tiles[i];
    if (t.type === 'sign') {
      const next = tiles[i + 1];
      if (next && next.type === 'simple') {
        const valStr = next.value >= 0 ? `+${next.value}` : String(next.value);
        const prefix = (parts.length === 0 && t.op === '+') ? '' : t.op;
        parts.push(`${prefix}(${valStr})`);
        i += 2; continue;
      }
      parts.push(t.op);
    } else if (t.type === 'mul') {
      const l = parts.length === 0 ? String(t.left) : (t.left >= 0 ? '+' + t.left : String(t.left));
      if (t.rightFrac) {
        parts.push(`${l}${t.op}${inlineFracHTMLMayWrap(t.rightFrac.num, t.rightFrac.den)}`);
      } else if (t.rightPow) {
        const rp = t.rightPow;
        const sup = rp.exp === 2 ? '²' : '³';
        const rpStr = rp.negated ? `(-${Math.abs(rp.base)}${sup})`
          : (rp.base < 0 ? `(${rp.base})${sup}` : `${rp.base}${sup}`);
        parts.push(`${l}${t.op || '×'}${rpStr}`);
      } else {
        parts.push(t.right < 0 ? `${l}${t.op}(${t.right})` : `${l}${t.op}${t.right}`);
      }
    } else if (t.type === 'pow') {
      const sup = t.exp === 2 ? '²' : '³';
      if (t.negated) {
        parts.push(`-${t.base}${sup}`);
      } else {
        const baseStr = t.base < 0 ? `(${t.base})` : String(t.base);
        if (parts.length === 0) {
          parts.push(`${baseStr}${sup}`);
        } else {
          const prefix = t.op || '+';
          parts.push(`${prefix}${baseStr}${sup}`);
        }
      }
    } else if (t.type === 'group_mul') {
      const bO = t.bracket === '{' ? '{' : '(';
      const bC = t.bracket === '{' ? '}' : ')';
      const inner = t.innerTiles.map((it, i) => formatInnerTile(it, i === 0)).join('');
      const rightStr = t.rightFrac
        ? inlineFracHTMLMayWrap(t.rightFrac.num, t.rightFrac.den)
        : (t.right !== null && t.right < 0) ? `(${t.right})` : String(t.right);
      const prefix = parts.length > 0 ? '+' : '';
      parts.push(`${prefix}${bO}${inner}${bC}${t.op || '×'}${rightStr}`);
    } else if (t.type === 'group_right') {
      const bO = t.bracket === '{' ? '{' : '(';
      const bC = t.bracket === '{' ? '}' : ')';
      const inner = t.innerTiles.map((it, i) => formatInnerTile(it, i === 0)).join('');
      const leftStr = parts.length === 0 ? String(t.left) : (t.left >= 0 ? `+${t.left}` : String(t.left));
      parts.push(`${leftStr}${t.op || '÷'}${bO}${inner}${bC}`);
    } else if (t.type === 'frac') {
      const fracH = inlineFracHTML(t.num, t.den);
      parts.push(parts.length === 0 ? fracH : (t.num >= 0 ? `+${fracH}` : fracH));
    } else { // simple
      if (parts.length === 0) parts.push(String(t.value));
      else parts.push(t.value >= 0 ? `+${t.value}` : String(t.value));
    }
    i++;
  }
  return parts.join('');
}

/* ---- Step log (途中式) ---- */
function addIntermediate() {
  const list = document.getElementById('steps-list');
  const line = document.createElement('span');
  line.className = 'step-line intermediate';
  line.innerHTML = `<span class="eq-mark">=</span><span class="expr-text">${currentExprStr()}</span>`;
  list.appendChild(line);
  list.scrollTop = list.scrollHeight;
}

/* ---- Win screen ---- */
/* ---- 暗算解答表示 ---- */
function computeAnswer(terms) {
  const v = computeTermsValue(terms);
  const rounded = Math.round(v);
  if (Math.abs(v - rounded) < 1e-9) {
    return { isInt: true, value: rounded };
  }
  // 小さい分母で一致するものを探す
  for (let den = 2; den <= 200; den++) {
    const num = Math.round(v * den);
    if (Math.abs(num / den - v) < 1e-9) {
      const g = gcdInt(Math.abs(num), den);
      return { isInt: false, frac: { num: num / g, den: den / g } };
    }
  }
  return { isInt: true, value: rounded }; // フォールバック
}

function showAnswerReveal() {

  `;
  document.body.appendChild(card);
}

}


/* ---- Random problem generator ---- */
function randInt(min, max) {
  return min + Math.floor(Math.random() * (max - min + 1));
}

function randNonZero(min, max) {
  let v = 0;
  while (v === 0) v = randInt(min, max);
  return v;
}

// ── ＋−のみ ──────────────────────────────────────────────
function genAddSub() {
  const suf = s => s >= 0 ? `+${s}` : `${s}`;
  // 50%: 符号問題（sign tile パターン）
  if (Math.random() < 0.5) {
    const patterns = [
      () => { const v = -randInt(1,9); const s = randNonZero(-9,9); return `-(${v})${suf(s)}`; },
      () => { const s = randNonZero(-9,9); const v = -randInt(1,9); return `${s}-(${v})`; },
      () => { const v = randInt(2,9);  const s = randNonZero(-9,9); return `-(+${v})${suf(s)}`; },
      () => { const s = randNonZero(-9,9); const v = randInt(2,9);  return `${s}-(+${v})`; },
      () => { const s = randNonZero(-9,9); const v = randInt(1,9);  return `${s}+(+${v})`; },
      () => { const s = randNonZero(-9,9); const v = -randInt(1,9); return `${s}+(${v})`; },
    ];
    return patterns[Math.floor(Math.random() * patterns.length)]();
  }
  // 純粋な加減算（整数 3〜4 項、最大4枚）
  const count = randInt(3, 4);
  const terms = [];
  for (let i = 0; i < count; i++) terms.push(randNonZero(-9, 9));
  return terms.map((v, i) => (v > 0 && i > 0) ? '+' + v : String(v)).join('');
}

// ── ×÷含む（整数のみ）────────────────────────────────────
function genMulDiv() {
  const mulCount = randInt(1, 2);
  const simCount = mulCount === 1 ? randInt(1, 2) : 0;
  const terms = [];
  for (let i = 0; i < mulCount; i++) {
    const op = Math.random() < 0.5 ? '×' : '÷';
    if (op === '÷') {
      let left, right, result;
      do {
        right  = randNonZero(-9, 9);
        result = randNonZero(-9, 9);
        left   = right * result;
      } while (Math.abs(right) === 1 || Math.abs(left) > 81);
      terms.push({ type: 'mul', op: '÷', left, right });
    } else {
      terms.push({ type: 'mul', op: '×', left: randNonZero(-9, 9), right: randNonZero(-9, 9) });
    }
  }
  for (let i = 0; i < simCount; i++) terms.push({ type: 'simple', value: randNonZero(-9, 9) });
  for (let i = terms.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [terms[i], terms[j]] = [terms[j], terms[i]];
  }
  return terms; // terms 配列をそのまま返す（generateAndStart 側で startGameFromTerms を使用）
}

// ── 累乗含む ──────────────────────────────────────────────
function genPow() {
  // 40%で「乗除に累乗を含む」バリアント: left × base^exp (+ optional simple)
  if (Math.random() < 0.40) {
    const terms = genPowMulTerms();
    if (terms) return terms;
  }

  // 既存ロジック（termsベースに変換・底の範囲を拡大）
  const withMul  = Math.random() < 0.4;
  const powCount = withMul ? 1 : randInt(1, 2);
  const mulCount = withMul ? 1 : 0;
  const simCount = withMul ? 0 : randInt(1, Math.max(1, 4 - powCount - 1));
  const terms = [];

  for (let i = 0; i < powCount; i++) {
    const exp     = Math.random() < 0.5 ? 2 : 3;
    const negated = Math.random() < 0.35;
    if (negated) {
      // 指数2: 底の絶対値 1〜8、指数3: 2 or 3
      const base = exp === 3 ? (Math.random() < 0.5 ? 2 : 3) : randInt(1, 8);
      terms.push({ type: 'pow', base, exp, negated: true });
    } else {
      // 指数2: 底 −8〜8（0除く）、負の底も可、指数3: 2 or 3
      const base = exp === 3 ? (Math.random() < 0.5 ? 2 : 3) : randNonZero(-8, 8);
      terms.push({ type: 'pow', base, exp });
    }
  }

  for (let i = 0; i < mulCount; i++) {
    const op = Math.random() < 0.5 ? '×' : '÷';
    if (op === '÷') {
      let left, right, result;
      do {
        right  = randNonZero(-9, 9);
        result = randNonZero(-9, 9);
        left   = right * result;
      } while (Math.abs(right) === 1 || Math.abs(left) > 81);
      terms.push({ type: 'mul', op: '÷', left, right });
    } else {
      terms.push({ type: 'mul', op: '×', left: randNonZero(-9, 9), right: randNonZero(-9, 9) });
    }
  }

  for (let i = 0; i < simCount; i++) terms.push({ type: 'simple', value: randNonZero(-9, 9) });

  for (let i = terms.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [terms[i], terms[j]] = [terms[j], terms[i]];
  }
  return terms;
}

// 乗除 × 累乗バリアント: left × base^exp  (+ optional simple)
function genPowMulTerms() {
  const exp     = Math.random() < 0.5 ? 2 : 3;
  const negated = Math.random() < 0.3;
  let base, powVal;
  if (negated) {
    base   = exp === 3 ? (Math.random() < 0.5 ? 2 : 3) : randInt(1, 8);
    powVal = -Math.pow(base, exp);
  } else {
    base   = exp === 3 ? (Math.random() < 0.5 ? 2 : 3) : randNonZero(-8, 8);
    powVal = Math.pow(base, exp);
  }
  if (powVal === 0) return null;

  const op = Math.random() < 0.7 ? '×' : '÷';
  let left;
  if (op === '÷') {
    // left を powVal の倍数にして整数除算を保証
    let k, tries = 0;
    do { k = randNonZero(-5, 5); left = k * powVal; tries++; }
    while (Math.abs(left) > 100 && tries < 20);
    if (Math.abs(left) > 100) return null;
  } else {
    left = randNonZero(-9, 9);
  }

  const mulTerm = { type: 'mul', op, left, rightPow: { base, exp, negated: !!negated } };
  const terms = [mulTerm];

  // 50%で simple tile を追加してシャッフル
  if (Math.random() < 0.5) {
    terms.push({ type: 'simple', value: randNonZero(-9, 9) });
    if (Math.random() < 0.5) [terms[0], terms[1]] = [terms[1], terms[0]];
  }
  return terms;
}

// ── 分数含む（累乗の出現もあり）────────────────────────────
function genFrac() {
  const validFracs = [
    {num:1,den:2},{num:1,den:3},{num:1,den:4},{num:1,den:5},
    {num:2,den:3},{num:2,den:5},
    {num:3,den:4},{num:3,den:5}
  ];

  // 30%の確率で「分数＋累乗」混合問題（カード最大4枚）
  const withPow = Math.random() < 0.3;

  // fracCount: withPow のときは1固定（frac=2枚+pow=1枚+sim=0or1枚で最大4枚）
  const fracCount = withPow ? 1 : randInt(1, 2);
  // simCount: withPow のときは0か1、通常は fracCount=1 なら1か2、fracCount=2 なら0
  const simCount = withPow
    ? (Math.random() < 0.5 ? 0 : 1)
    : (fracCount === 1 ? randInt(1, 2) : 0);

  const terms = [];

  // 分数タイルを追加
  for (let i = 0; i < fracCount; i++) {
    const base = validFracs[Math.floor(Math.random() * validFracs.length)];
    // 40%の確率で負の分数にする
    const fracNum = Math.random() < 0.4 ? -base.num : base.num;
    const frac = { num: fracNum, den: base.den };
    const isDivFrac = Math.random() < 0.45;
    if (isDivFrac) {
      // left ÷ (fracNum/den)：left = k*fracNum で整数結果 k*den
      let left;
      do {
        const k = randNonZero(-5, 5);
        left = k * fracNum;
      } while (Math.abs(left * frac.den / fracNum) > 20 || left === 0);
      terms.push({ type: 'mul', op: '÷', left, rightFrac: frac });
    } else {
      // left × (fracNum/den)：left = k*den で整数結果 k*fracNum
      let left;
      do {
        const k = randNonZero(-5, 5);
        left = k * frac.den;
      } while (Math.abs(left * fracNum / frac.den) > 20 || left === 0);
      terms.push({ type: 'mul', op: '×', left, rightFrac: frac });
    }
  }

  // 累乗タイルを追加（withPow のとき）
  if (withPow) {
    const exp     = Math.random() < 0.5 ? 2 : 3;
    const negated = Math.random() < 0.35;
    if (negated) {
      const base = exp === 3 ? (Math.random() < 0.5 ? 2 : 3) : randInt(2, 4);
      terms.push({ type: 'pow', base, exp, negated: true });
    } else {
      const base = exp === 3 ? (Math.random() < 0.5 ? 2 : 3) : randNonZero(-4, 4);
      terms.push({ type: 'pow', base, exp });
    }
  }

  // 単純タイルを追加
  for (let i = 0; i < simCount; i++) terms.push({ type: 'simple', value: randNonZero(-9, 9) });

  // シャッフル
  for (let i = terms.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [terms[i], terms[j]] = [terms[j], terms[i]];
  }

  return terms.map((t, i) => {
    if (t.type === 'mul' && t.rightFrac) {
      const l = (t.left > 0 && i > 0) ? '+' + t.left : String(t.left);
      return `${l}${t.op}(${t.rightFrac.num}/${t.rightFrac.den})`;
    }
    if (t.type === 'pow') {
      if (t.negated) return `-${t.base}^${t.exp}`;
      const baseStr = t.base < 0 ? `(${t.base})` : String(t.base);
      return i === 0 ? `${baseStr}^${t.exp}` : `+${baseStr}^${t.exp}`;
    }
    return (t.value > 0 && i > 0) ? '+' + t.value : String(t.value);
  }).join('');
}

// ── かっこ含む ──────────────────────────────────────────────
function pickOuterOp(innerSum) {
  // innerSum を割り切れる数があれば ÷ も選択肢に入れる
  const op = Math.random() < 0.5 ? '×' : '÷';
  if (op === '÷') {
    const divs = [];
    for (let d = -9; d <= 9; d++) {
      if (Math.abs(d) >= 2 && innerSum % d === 0) divs.push(d);
    }
    if (divs.length > 0) return { op: '÷', right: divs[Math.floor(Math.random() * divs.length)] };
  }
  let right;
  do { right = randNonZero(-5, 5); } while (Math.abs(right) === 1);
  return { op: '×', right };
}

// 外側を分数にするヘルパー（整数結果が出る分数のみ）
function pickOuterFrac(innerSum) {
  const validFracs = [
    {num:1,den:2},{num:1,den:3},{num:1,den:4},{num:1,den:5},
    {num:2,den:3},{num:2,den:5},{num:3,den:4},{num:3,den:5}
  ];
  const candidates = [];
  for (const f of validFracs) {
    // 正の分数 ×
    const mulResult = innerSum * f.num / f.den;
    if (Number.isInteger(mulResult) && mulResult !== 0 && Math.abs(mulResult) <= 20)
      candidates.push({ op: '×', rightFrac: f });
    // 負の分数 ×（÷は逆数変換が複雑なので除外）
    const negMulResult = innerSum * (-f.num) / f.den;
    if (Number.isInteger(negMulResult) && negMulResult !== 0 && Math.abs(negMulResult) <= 20)
      candidates.push({ op: '×', rightFrac: { num: -f.num, den: f.den } });
    // 正の分数 ÷
    const divResult = innerSum * f.den / f.num;
    if (Number.isInteger(divResult) && divResult !== 0 && Math.abs(divResult) <= 20)
      candidates.push({ op: '÷', rightFrac: f });
    // 負の分数 ÷（÷(-p/q) = ×(-q/p)、結果は正の÷と符号反転）
    if (Number.isInteger(divResult) && divResult !== 0 && Math.abs(divResult) <= 20)
      candidates.push({ op: '÷', rightFrac: { num: -f.num, den: f.den } });
  }
  if (candidates.length === 0) return null;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

// シンプルな足し引きのみ
function genParenSimple() {
  const innerCount = randInt(2, 3);
  let innerVals;
  do {
    innerVals = Array.from({ length: innerCount }, () => randNonZero(-9, 9));
  } while (innerVals.reduce((a, b) => a + b, 0) === 0);
  const innerSum = innerVals.reduce((a, b) => a + b, 0);
  const innerTiles = innerVals.map(v => ({ type: 'simple', value: v }));
  let groupTerm;
  if (Math.random() < 0.30) {
    const fracOp = pickOuterFrac(innerSum);
    if (fracOp) groupTerm = { type: 'group_mul', bracket: '(', innerTiles, op: fracOp.op, right: null, rightFrac: fracOp.rightFrac };
  }
  if (!groupTerm) {
    const { op, right } = pickOuterOp(innerSum);
    groupTerm = { type: 'group_mul', bracket: '(', innerTiles, op, right };
  }
  const terms = [groupTerm];
  if (innerCount === 2 && Math.random() < 0.3) terms.push({ type: 'simple', value: randNonZero(-9, 9) });
  return terms;
}

// ── かっこが右側にくるバリアント ────────────────────────────────
// A ÷ (B+C) / A × (B+C) の形式
function genRightParenSimple() {
  const innerCount = randInt(2, 3);
  let innerVals, innerSum;
  do {
    innerVals = Array.from({ length: innerCount }, () => randNonZero(-9, 9));
    innerSum = innerVals.reduce((a, b) => a + b, 0);
  } while (innerSum === 0);

  // 50%で除算（leftはinnerSumの倍数）、50%で乗算（任意の整数）
  let left, op;
  if (Math.random() < 0.5 && innerSum !== 0) {
    op = '÷';
    let k;
    let tries = 0;
    do { k = randNonZero(-5, 5); tries++; } while ((Math.abs(k) === 1 || Math.abs(k * innerSum) > 20) && tries < 30);
    left = k * innerSum;
  } else {
    op = '×';
    let tries = 0;
    do { left = randNonZero(-5, 5); tries++; } while ((Math.abs(left) === 1 || Math.abs(left * innerSum) > 20) && tries < 30);
  }
  const innerTiles = innerVals.map(v => ({ type: 'simple', value: v }));
  return [{ type: 'group_right', bracket: '(', left, op, innerTiles }];
}

// A ÷ (B^N + C) など累乗を含む右かっこバリアント
function genRightParenPow() {
  const exp  = Math.random() < 0.5 ? 2 : 3;
  const base = exp === 3 ? (Math.random() < 0.5 ? 2 : 3) : randInt(2, 4);
  const negated = Math.random() < 0.4;
  const powVal = negated ? -Math.pow(base, exp) : Math.pow(base, exp);

  // inner = simple + pow → 整数の divisor を left に設定
  let simple;
  let tries = 0;
  do { simple = randNonZero(-9, 9); tries++; } while (simple + powVal === 0 && tries < 30);
  const innerSum = simple + powVal;
  if (innerSum === 0) return genRightParenSimple();

  // left が innerSum の倍数になるよう選ぶ
  let left, op;
  if (innerSum !== 0 && Math.random() < 0.6) {
    op = '÷';
    let k, t2 = 0;
    do { k = randNonZero(-5, 5); t2++; } while ((Math.abs(k) === 1 || Math.abs(k * innerSum) > 30) && t2 < 30);
    left = k * innerSum;
  } else {
    op = '×';
    let t2 = 0;
    do { left = randNonZero(-5, 5); t2++; } while ((Math.abs(left) === 1 || Math.abs(left * innerSum) > 30) && t2 < 30);
  }
  const innerTiles = [
    { type: 'simple', value: simple },
    { type: 'pow', base, exp, negated }
  ];
  return [{ type: 'group_right', bracket: '(', left, op, innerTiles }];
}

// かっこ内に累乗を含む: (A ± base^exp) × C
function genParenWithPow() {
  const exp     = Math.random() < 0.5 ? 2 : 3;
  const base    = exp === 3 ? (Math.random() < 0.5 ? 2 : 3) : randInt(2, 4);
  const negated = Math.random() < 0.5;  // true → -(base^exp)
  const powVal  = negated ? -Math.pow(base, exp) : Math.pow(base, exp);
  let simple;
  do { simple = randNonZero(-7, 7); } while (simple + powVal === 0);
  const innerSum = simple + powVal;
  let op, right, rightFrac = null;
  if (Math.random() < 0.30) {
    const fracOp = pickOuterFrac(innerSum);
    if (fracOp) { op = fracOp.op; rightFrac = fracOp.rightFrac; right = null; }
  }
  if (!op) { const chosen = pickOuterOp(innerSum); op = chosen.op; right = chosen.right; }
  return [{ type: 'group_mul', bracket: '(',
    innerTiles: [
      { type: 'simple', value: simple },
      { type: 'pow', base, exp, negated }
    ], op, right, rightFrac }];
}

// かっこ内に乗算を含む: (A ± B×C) × D
function genParenWithMul() {
  let simple, mulLeft, mulRight, innerSum;
  let tries = 0;
  do {
    simple   = randNonZero(-7, 7);
    mulLeft  = randNonZero(-5, 5);
    mulRight = randInt(2, 5);
    innerSum = simple + mulLeft * mulRight;
    tries++;
  } while (innerSum === 0 && tries < 30);
  if (innerSum === 0) return genParenSimple();
  let op, right, rightFrac = null;
  if (Math.random() < 0.30) {
    const fracOp = pickOuterFrac(innerSum);
    if (fracOp) { op = fracOp.op; rightFrac = fracOp.rightFrac; right = null; }
  }
  if (!op) { const chosen = pickOuterOp(innerSum); op = chosen.op; right = chosen.right; }
  return [{ type: 'group_mul', bracket: '(',
    innerTiles: [
      { type: 'simple', value: simple },
      { type: 'mul', op: '×', left: mulLeft, right: mulRight }
    ], op, right, rightFrac }];
}

function genParen() {
  const r = Math.random();
  // 30%: かっこが右側にくるバリアント
  if (r < 0.15) return genRightParenPow();
  if (r < 0.30) return genRightParenSimple();
  // 70%: 従来の左かっこバリアント
  if (r < 0.55) return genParenWithPow();
  if (r < 0.75) return genParenWithMul();
  return genParenSimple();
}

// ── 答えが分数になる問題 ────────────────────────────────────
// target を n 個の非ゼロ整数（絶対値<=9）の和で表せる組み合わせを返す
function genSumParts(target, n) {
  for (let tries = 0; tries < 80; tries++) {
    const parts = [];
    let rem = target;
    for (let i = 0; i < n - 1; i++) {
      let v;
      // 残りをあとの項で賄えるよう範囲を絞る
      const lo = Math.max(-9, rem - 9 * (n - 1 - i));
      const hi = Math.min(9,  rem + 9 * (n - 1 - i));
      let t2 = 0;
      do { v = Math.floor(Math.random() * (hi - lo + 1)) + lo; t2++; }
      while (v === 0 && t2 < 20);
      if (v === 0) break;
      parts.push(v);
      rem -= v;
    }
    if (parts.length < n - 1) continue;
    if (rem === 0 || Math.abs(rem) > 9) continue;
    parts.push(rem);
    if (parts.every(v => v !== 0)) return parts;
  }
  return null;
}

// ── 答えが分数：分子 > 1 バリアント（約分あり・なし両対応）────────────────
function genFracAnswerLargerNum() {
  const wantYakubun = Math.random() < 0.45; // 45%で乗算後に約分が起こるパターン

  for (let attempt = 0; attempt < 80; attempt++) {
    const p = randInt(2, 4); // 分数カードの分子 2〜4

    // 分数カード p/q は常に既約（gcd(p,q)=1）
    const qCands = [];
    for (let qq = p + 1; qq <= 12; qq++) {
      if (gcdInt(p, qq) === 1) qCands.push(qq);
    }
    if (qCands.length === 0) continue;
    const q = qCands[Math.floor(Math.random() * qCands.length)];

    // 分数カードを負にするか（40%）
    const sign    = Math.random() < 0.4 ? -1 : 1;
    const fracNum = sign * p; // rightFrac.num（既約）

    // かっこ内の和 innerSum
    // wantYakubun: gcd(innerSum, q) > 1 になる値を選ぶ（乗算後に約分が起きる）
    // 通常:       gcd(innerSum, q) = 1 の値を選ぶ
    let innerSum;
    if (wantYakubun) {
      const iCands = [];
      for (let v = -6; v <= 6; v++) {
        if (v !== 0 && gcdInt(Math.abs(v), q) > 1) iCands.push(v);
      }
      if (iCands.length === 0) continue;
      innerSum = iCands[Math.floor(Math.random() * iCands.length)];
    } else {
      innerSum = randNonZero(-6, 6);
    }

    // 最終答えを計算
    const rawNum  = innerSum * fracNum;        // 約分前の分子
    const g       = gcdInt(Math.abs(rawNum), q);
    const finalNum = rawNum / g;
    const finalDen = q / g;

    // 整数になるのはNG（答えが分数でなくなる）
    if (finalDen === 1) continue;
    // 答えの範囲チェック
    if (Math.abs(finalNum) > 13 || finalDen > 9) continue;

    // inner タイルを生成（innerSum を n 項に分割）
    const n = Math.abs(innerSum) >= 3 && Math.random() < 0.4 ? 3 : 2;
    const parts = genSumParts(innerSum, n);
    if (!parts) continue;

    // バリアント選択: 通常の innerTiles / 乗算内包 innerTile
    const useInnerMul = Math.random() < 0.35 && Math.abs(innerSum) >= 2;
    if (useInnerMul) {
      // (A×B) × (p/q) — innerSum = mLeft × mRight
      const mFactors = [];
      for (let a = -6; a <= 6; a++) {
        if (Math.abs(a) < 2) continue;
        for (let b = 2; b <= 6; b++) {
          if (a * b === innerSum) mFactors.push({ a, b });
        }
      }
      if (mFactors.length === 0) continue;
      const { a, b } = mFactors[Math.floor(Math.random() * mFactors.length)];
      return [{
        type: 'group_mul', bracket: '(',
        innerTiles: [{ type: 'mul', op: '×', left: a, right: b }],
        op: '×', rightFrac: { num: fracNum, den: q }
      }];
    }

    return [{
      type: 'group_mul', bracket: '(',
      innerTiles: parts.map(v => ({ type: 'simple', value: v })),
      op: '×', rightFrac: { num: fracNum, den: q }
    }];
  }
  return null;
}

function genFracAnswer() {
  // 45%で分子 > 1 バリアント（約分あり・なし）を優先
  if (Math.random() < 0.45) {
    const result = genFracAnswerLargerNum();
    if (result) return result;
  }

  // 既約分数 num/den の候補リスト（真分数・仮分数）
  const candidates = [];
  for (let den = 2; den <= 9; den++) {
    for (let num = 1; num <= den + 4 && num <= 13; num++) {
      if (num !== den && gcdInt(num, den) === 1) {
        candidates.push({ num,  den });
        candidates.push({ num: -num, den });
      }
    }
  }

  const { num, den } = candidates[Math.floor(Math.random() * candidates.length)];

  // 累乗候補（内側タイルとして使える pow）
  const powOpts = [
    { val:  4, tile: { type: 'pow', base: 2, exp: 2 } },
    { val:  8, tile: { type: 'pow', base: 2, exp: 3 } },
    { val:  9, tile: { type: 'pow', base: 3, exp: 2 } },
    { val: -4, tile: { type: 'pow', base: 2, exp: 2, negated: true } },
    { val: -8, tile: { type: 'pow', base: 2, exp: 3, negated: true } },
    { val: -9, tile: { type: 'pow', base: 3, exp: 2, negated: true } },
  ];

  // 累乗バリアント A: (pow + B) ÷ den  ← かっこ内の和 = num
  function tryGroupMulWithPow() {
    const shuffled = [...powOpts].sort(() => Math.random() - 0.5);
    for (const pw of shuffled) {
      const remaining = num - pw.val;
      if (remaining === 0 || Math.abs(remaining) > 9) continue;
      const innerTiles = Math.random() < 0.5
        ? [{ ...pw.tile }, { type: 'simple', value: remaining }]
        : [{ type: 'simple', value: remaining }, { ...pw.tile }];
      return [{ type: 'group_mul', bracket: '(', innerTiles, op: '÷', right: den }];
    }
    return null;
  }

  // 累乗バリアント A2: (pow + B) × (±1/den)  ← かっこ内の和 = ±num
  function tryGroupMulFracWithPow() {
    const shuffled = [...powOpts].sort(() => Math.random() - 0.5);
    const useNeg = Math.random() < 0.4;
    const innerTarget = useNeg ? -num : num;
    for (const pw of shuffled) {
      const remaining = innerTarget - pw.val;
      if (remaining === 0 || Math.abs(remaining) > 9) continue;
      const innerTiles = Math.random() < 0.5
        ? [{ ...pw.tile }, { type: 'simple', value: remaining }]
        : [{ type: 'simple', value: remaining }, { ...pw.tile }];
      return [{ type: 'group_mul', bracket: '(', innerTiles,
        op: '×', rightFrac: { num: useNeg ? -1 : 1, den } }];
    }
    return null;
  }

  // 累乗バリアント B: num ÷ (pow + B)  ← かっこ内の和 = den
  function tryGroupRightWithPow() {
    const shuffled = [...powOpts].sort(() => Math.random() - 0.5);
    for (const pw of shuffled) {
      const remaining = den - pw.val;
      if (remaining === 0 || Math.abs(remaining) > 9) continue;
      const innerTiles = Math.random() < 0.5
        ? [{ ...pw.tile }, { type: 'simple', value: remaining }]
        : [{ type: 'simple', value: remaining }, { ...pw.tile }];
      return [{ type: 'group_right', bracket: '(', left: num, op: '÷', innerTiles }];
    }
    return null;
  }

  // バリアント A: (A + B [+ C]) ÷ den  ← かっこ内の和 = num
  function tryGroupMul() {
    const n = Math.abs(num) >= 3 && Math.random() < 0.4 ? 3 : 2;
    const parts = genSumParts(num, n);
    if (!parts) return null;
    return [{
      type: 'group_mul', bracket: '(',
      innerTiles: parts.map(v => ({ type: 'simple', value: v })),
      op: '÷', right: den
    }];
  }

  // バリアント B: num ÷ (A + B [+ C])  ← かっこ内の和 = den
  function tryGroupRight() {
    const n = den >= 3 && Math.random() < 0.4 ? 3 : 2;
    const parts = genSumParts(den, n);
    if (!parts) return null;
    return [{
      type: 'group_right', bracket: '(',
      left: num, op: '÷',
      innerTiles: parts.map(v => ({ type: 'simple', value: v }))
    }];
  }

  // ── 2項バリアント ─────────────────────────────────────────
  // ÷分数バリアント: left ÷ (p/q) → ÷を押すと × 逆数に変換 → 答え num/den
  // 正の分数版: sign(num) ÷ (den/|num|)  →  sign(num) × |num|/den  = num/den
  // 負の分数版: 1 ÷ (-den/|num|)         →  1 × (-|num|/den)       = num/den  (num<0 限定)
  function tryDivFrac() {
    const absNum = Math.abs(num);
    if (absNum === 1) return null; // den/1 は分数カードにならない
    const useNegFrac = num < 0 && Math.random() < 0.5;
    const left    = useNegFrac ? 1 : Math.sign(num);
    const fracNum = useNegFrac ? -den : den;
    const fracDen = absNum;
    return [{ type: 'mul', op: '÷', left, right: null, rightFrac: { num: fracNum, den: fracDen } }];
  }

  // 分数カードバリアント: (A+B) × (±1/den)  ← 答えは num/den
  // 負の場合: かっこ内の和 = -num、× (-1/den) で答えは num/den
  function tryGroupMulFrac() {
    const useNeg = Math.random() < 0.5; // 50%で負の分数カード
    const innerTarget = useNeg ? -num : num;
    const n = Math.abs(innerTarget) >= 3 && Math.random() < 0.4 ? 3 : 2;
    const parts = genSumParts(innerTarget, n);
    if (!parts) return null;
    return [{
      type: 'group_mul', bracket: '(',
      innerTiles: parts.map(v => ({ type: 'simple', value: v })),
      op: '×', rightFrac: { num: useNeg ? -1 : 1, den }
    }];
  }

  // ── 新バリアント: かっこ内に×÷を含む ─────────────────────────
  // 2内側タイル: (A×B + C) ÷ den  or  (A×B + C) × (±1/den)
  function tryGroupMulWithInnerMul() {
    const useNeg = Math.random() < 0.4;
    const innerTarget = useNeg ? -num : num;
    let mLeft, mRight, rest, tries = 0;
    do {
      mLeft  = randNonZero(-5, 5);
      mRight = randInt(2, 6);
      rest   = innerTarget - mLeft * mRight;
      tries++;
    } while ((rest === 0 || Math.abs(rest) > 9) && tries < 60);
    if (rest === 0 || Math.abs(rest) > 9) return null;
    const mulTile  = { type: 'mul', op: '×', left: mLeft, right: mRight };
    const simpTile = { type: 'simple', value: rest };
    const innerTiles = Math.random() < 0.5 ? [mulTile, simpTile] : [simpTile, mulTile];
    if (useNeg) {
      return [{ type: 'group_mul', bracket: '(', innerTiles, op: '×', rightFrac: { num: -1, den } }];
    }
    return Math.random() < 0.5
      ? [{ type: 'group_mul', bracket: '(', innerTiles, op: '÷', right: den }]
      : [{ type: 'group_mul', bracket: '(', innerTiles, op: '×', rightFrac: { num: 1, den } }];
  }

  // 2内側タイル: num ÷ (A×B + C)  ← group_right に乗算内包
  function tryGroupRightWithInnerMul() {
    let mLeft, mRight, rest, tries = 0;
    do {
      mLeft  = randNonZero(-5, 5);
      mRight = randInt(2, 6);
      rest   = den - mLeft * mRight;
      tries++;
    } while ((rest === 0 || Math.abs(rest) > 9) && tries < 60);
    if (rest === 0 || Math.abs(rest) > 9) return null;
    const mulTile  = { type: 'mul', op: '×', left: mLeft, right: mRight };
    const simpTile = { type: 'simple', value: rest };
    const innerTiles = Math.random() < 0.5 ? [mulTile, simpTile] : [simpTile, mulTile];
    return [{ type: 'group_right', bracket: '(', left: num, op: '÷', innerTiles }];
  }

  // 1内側タイル: (A×B) ÷ den  or  (A×B) × (±1/den)
  function tryGroupMulSingleInnerMul() {
    const useNeg = Math.random() < 0.4;
    const innerTarget = useNeg ? -num : num;
    const factors = [];
    for (let a = -9; a <= 9; a++) {
      if (Math.abs(a) < 2) continue;
      for (let b = 2; b <= 9; b++) {
        if (a * b === innerTarget) factors.push({ a, b });
      }
    }
    if (factors.length === 0) return null;
    const { a, b } = factors[Math.floor(Math.random() * factors.length)];
    const innerTiles = [{ type: 'mul', op: '×', left: a, right: b }];
    if (useNeg) {
      return [{ type: 'group_mul', bracket: '(', innerTiles, op: '×', rightFrac: { num: -1, den } }];
    }
    return Math.random() < 0.5
      ? [{ type: 'group_mul', bracket: '(', innerTiles, op: '÷', right: den }]
      : [{ type: 'group_mul', bracket: '(', innerTiles, op: '×', rightFrac: { num: 1, den } }];
  }

  // 1内側タイル: (A÷B) ÷ den  or  (A÷B) × (±1/den)
  function tryGroupMulSingleInnerDiv() {
    const useNeg = Math.random() < 0.4;
    const innerTarget = useNeg ? -num : num;
    const pairs = [];
    for (let b = 2; b <= 7; b++) {
      const a = innerTarget * b;
      if (a !== 0 && Math.abs(a) <= 36) pairs.push({ a, b });
    }
    if (pairs.length === 0) return null;
    const { a, b } = pairs[Math.floor(Math.random() * pairs.length)];
    const innerTiles = [{ type: 'mul', op: '÷', left: a, right: b }];
    if (useNeg) {
      return [{ type: 'group_mul', bracket: '(', innerTiles, op: '×', rightFrac: { num: -1, den } }];
    }
    return Math.random() < 0.5
      ? [{ type: 'group_mul', bracket: '(', innerTiles, op: '÷', right: den }]
      : [{ type: 'group_mul', bracket: '(', innerTiles, op: '×', rightFrac: { num: 1, den } }];
  }

  // 30% で累乗バリアントを優先
  if (Math.random() < 0.30) {
    const powFns = [tryGroupMulWithPow, tryGroupRightWithPow, tryGroupMulFracWithPow]
      .sort(() => Math.random() - 0.5);
    for (const fn of powFns) {
      const result = fn();
      if (result) return result;
    }
  }

  // 残り70%を7種類のバリアントでシャッフル
  // ※ かっこ内の計算を含む・分数はかっこの外・カード4枚以内、の条件を満たすもののみ
  const variants = [
    tryGroupMulFrac,              // (A+B)×(±1/den)
    tryGroupMul,                  // (A+B[+C])÷den
    tryGroupRight,                // num÷(A+B[+C])
    tryGroupMulWithInnerMul,      // (A×B+C)÷den or ×(±1/den)
    tryGroupRightWithInnerMul,    // num÷(A×B+C)
    tryGroupMulSingleInnerMul,    // (A×B)÷den or ×(±1/den)
    tryGroupMulSingleInnerDiv,    // (A÷B)÷den or ×(±1/den)
  ].sort(() => Math.random() - 0.5);

  for (const fn of variants) {
    const result = fn();
    if (result) return result;
  }

  // フォールバック
  return tryGroupMul() || [{
    // 万一どちらも失敗したら最低限 2 タイル（group_mul で 2 枚内側）
    type: 'group_mul', bracket: '(',
    innerTiles: [{ type: 'simple', value: 1 }, { type: 'simple', value: num - 1 || 1 }],
    op: '÷', right: den
  }];
}

/* ---- 問題種別ラベル更新 ---- */
const GAME_TYPE_LABELS = {
  'addsub':     '＋−のみ',
  'muldiv':     '×÷含む',
  'pow':        '累乗含む',
  'frac':       '分数含む',
  'paren':      'かっこ含む',
  'frac-answer':'答えが分数',
};
function updateGameTypeLabel(type) {
  const el = document.getElementById('game-type-label');
  if (!el) return;
  el.textContent = type ? (GAME_TYPE_LABELS[type] || '完全ランダム') : '完全ランダム';
}

/* ---- パネル表示/非表示トグル ---- */
let panelHidden = false; // 非表示状態を維持（問題をまたいで引き継ぐ）

function togglePanel() {
  panelHidden = !panelHidden;
  applyPanelState();
}

function applyPanelState() {
  const area = document.getElementById('game-area');
  const btn  = document.getElementById('panel-toggle-btn');
  if (!area || !btn) return;
  area.classList.toggle('panel-hidden', panelHidden);
  btn.textContent = panelHidden ? '表示' : '非表示';
}

function showPanel() {
  // 呼び出し元はそのままにして、panelHidden 状態を尊重する
  applyPanelState();
}

/* ---- 問題の最終答えを計算（答え範囲チェック用） ---- */
function computeInnerValue(innerTiles) {
  let s = 0;
  for (const t of innerTiles) {
    if (t.type === 'simple') {
      s += t.value;
    } else if (t.type === 'pow') {
      const raw = t.negated ? -Math.pow(t.base, t.exp) : Math.pow(t.base, t.exp);
      s += (t.base < 0 && t.op === '-') ? -raw : raw;
    } else if (t.type === 'mul') {
      s += t.op === '÷' ? t.left / t.right : t.left * t.right;
    }
  }
  return s;
}

function computeTermsValue(terms) {
  let sum = 0;
  let i = 0;
  while (i < terms.length) {
    const t = terms[i];
    if (t.type === 'sign') {
      // sign タイルは次の simple タイルと対になる: -(+5) → -5, -(-3) → 3
      const next = terms[i + 1];
      if (next && next.type === 'simple') {
        sum += t.op === '-' ? -next.value : next.value;
        i += 2; continue;
      }
      i++; continue;
    }
    if (t.type === 'simple') {
      sum += t.value;
    } else if (t.type === 'mul') {
      if (t.rightFrac != null) {
        const fv = t.rightFrac.num / t.rightFrac.den;
        sum += t.op === '÷' ? t.left / fv : t.left * fv;
      } else if (t.rightPow != null) {
        const rp = t.rightPow;
        const pv = rp.negated ? -Math.pow(rp.base, rp.exp) : Math.pow(rp.base, rp.exp);
        sum += t.op === '÷' ? t.left / pv : t.left * pv;
      } else {
        sum += t.op === '÷' ? t.left / t.right : t.left * t.right;
      }
    } else if (t.type === 'pow') {
      const raw = t.negated ? -Math.pow(t.base, t.exp) : Math.pow(t.base, t.exp);
      sum += (t.base < 0 && t.op === '-') ? -raw : raw;
    } else if (t.type === 'frac') {
      sum += t.num / t.den;
    } else if (t.type === 'group_mul') {
      const iv = computeInnerValue(t.innerTiles);
      if (t.rightFrac != null) {
        const fv = t.rightFrac.num / t.rightFrac.den;
        sum += t.op === '÷' ? iv / fv : iv * fv;
      } else {
        sum += t.op === '÷' ? iv / t.right : iv * t.right;
      }
    } else if (t.type === 'group_right') {
      const iv = computeInnerValue(t.innerTiles);
      sum += t.op === '÷' ? t.left / iv : t.left * iv;
    }
    i++;
  }
  return sum;
}

/* ---- 答えが ±100 以内になるまでリトライして terms を返す ---- */
function genWithLimit(genFn, maxTries = 40) {
  for (let i = 0; i < maxTries; i++) {
    const terms = genFn();
    if (Math.abs(computeTermsValue(terms)) <= 100) return terms;
  }
  // maxTries 回試してもダメなら最後の結果をそのまま使う
  return genFn();
}

function generateAndStart(type) {
  lastGameType = type || null;

  if (type === 'paren') {
    startGameFromTerms(genWithLimit(genParen));
    return;
  }
  if (type === 'frac-answer') {
    startGameFromTerms(genFracAnswer()); // 答えは常に小数分数、範囲外なし
    return;
  }
  if (type === 'pow') {
    startGameFromTerms(genWithLimit(genPow));
    return;
  }
  if (type === 'muldiv') {
    startGameFromTerms(genWithLimit(genMulDiv));
    return;
  }

  let expr;
  if (type === 'addsub') {
    expr = genAddSub(); // max ±36、範囲外なし
  } else if (type === 'frac') {
    expr = genFrac(); // max ±40、範囲外なし
  } else {
    // 完全ランダム
    const r = Math.random();
    if (r < 0.15) {
      expr = genAddSub();
    } else if (r < 0.30) {
      startGameFromTerms(genWithLimit(genMulDiv)); return;
    } else if (r < 0.45) {
      startGameFromTerms(genWithLimit(genPow)); return;
    } else if (r < 0.60) {
      expr = genFrac();
    } else if (r < 0.80) {
      startGameFromTerms(genWithLimit(genParen)); return;
    } else {
      startGameFromTerms(genFracAnswer()); return;
    }
  }
  document.getElementById('expr-input').value = expr;
  startGame();
}

/* ---- Init ---- */
startGame();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
